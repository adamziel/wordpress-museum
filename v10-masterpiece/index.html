<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WordPress Museum · v10 · Nine Movements</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --display:"Didot","Bodoni 72",Georgia,"Times New Roman",serif;
    --prose:"Iowan Old Style","Palatino Linotype","Palatino","Book Antiqua",Georgia,serif;
    --mono:"IBM Plex Mono","JetBrains Mono","Menlo",ui-monospace,monospace;
    --ui:"Inter","SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --ink:#f2eee4;
    --accent:#e9c97a;
  }
  html,body{background:#05060a;color:var(--ink);font-family:var(--ui);overflow-x:hidden;-webkit-font-smoothing:antialiased}
  body{height:16100px}

  /* ---------- Stage ---------- */
  #stage{position:fixed;inset:0;z-index:1;background:#05060a;overflow:hidden}
  #stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #breath{position:fixed;inset:-2% -2% -2% -2%;z-index:1;pointer-events:none;will-change:transform}

  /* ---------- Loading splash ---------- */
  #boot{position:fixed;inset:0;z-index:80;background:#05060a;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:opacity .7s}
  #boot.gone{opacity:0;pointer-events:none}
  #boot .ring{position:absolute;width:280px;height:280px;border-radius:50%;border:1px solid rgba(233,201,122,.3);animation:spin 8s linear infinite}
  #boot .ring:nth-child(2){width:220px;height:220px;border-color:rgba(233,201,122,.18);animation-duration:14s;animation-direction:reverse}
  #boot .ring:nth-child(3){width:160px;height:160px;border-color:rgba(233,201,122,.1);animation-duration:20s}
  #boot .core{position:relative;text-align:center;z-index:1}
  #boot .core .mark{font:400 10px/1 var(--mono);letter-spacing:4px;color:#c5ae7a;opacity:.7;margin-bottom:18px}
  #boot .core .title{font:400 34px/1 var(--display);letter-spacing:2px;color:#f4ecd6}
  #boot .core .sub{font:400 10px/1.8 var(--mono);letter-spacing:3px;margin-top:18px;color:#8d7b54;text-transform:uppercase}
  #boot .bar{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);width:240px;height:1px;background:rgba(233,201,122,.18)}
  #boot .bar .f{position:absolute;left:0;top:0;bottom:0;width:0%;background:#e9c97a;transition:width .25s ease}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- Start splash ---------- */
  #splash{position:fixed;inset:0;z-index:70;background:radial-gradient(ellipse at 50% 40%,#1b120a,#05060a 65%);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .7s}
  #splash.gone{opacity:0;pointer-events:none}
  #splash .slab{text-align:center;max-width:640px;padding:44px 40px;border-top:1px solid rgba(233,201,122,.4);border-bottom:1px solid rgba(233,201,122,.4)}
  #splash .k{font:400 10px/1 var(--mono);letter-spacing:5px;color:#c5ae7a;text-transform:uppercase;display:block;margin-bottom:20px}
  #splash h1{font:400 52px/1.05 var(--display);letter-spacing:3px;color:#f4ecd6;margin-bottom:8px}
  #splash .subtitle{font:400 italic 16px/1.4 var(--prose);color:#c8bfa6;margin-bottom:28px}
  #splash p{font:400 13px/1.7 var(--prose);color:#b9af95;margin:0 auto;max-width:480px}
  #splash .cta{font:500 10px/1 var(--mono);letter-spacing:6px;color:#e9c97a;margin-top:26px;text-transform:uppercase}
  #splash .cta .pulse{display:inline-block;width:8px;height:8px;background:#e9c97a;border-radius:50%;margin-right:10px;vertical-align:middle;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}

  /* ---------- HUD ---------- */
  #hud{position:fixed;top:0;left:0;right:0;z-index:15;pointer-events:none;padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--ui)}
  #hud .left{display:flex;flex-direction:column;gap:10px}
  #hud .release{font:400 13px/1 var(--mono);letter-spacing:4px;color:#c5ae7a;text-transform:uppercase;text-shadow:0 1px 2px rgba(0,0,0,.8),0 0 10px rgba(0,0,0,.6)}
  #hud .movement{font:400 28px/1 var(--display);letter-spacing:1.5px;color:var(--accent,#e9c97a);text-shadow:0 2px 6px rgba(0,0,0,.85),0 0 18px rgba(233,201,122,.25);transition:color .8s,text-shadow .8s}
  #hud .era{font:400 10px/1 var(--mono);letter-spacing:3px;color:#8d7b54;text-transform:uppercase;text-shadow:0 1px 2px rgba(0,0,0,.8)}
  html.light-era #hud .release{color:#2a2218;text-shadow:0 1px 2px rgba(255,255,255,.8),0 0 8px rgba(255,255,255,.6)}
  html.light-era #hud .movement{color:#1a1510;text-shadow:0 2px 6px rgba(255,255,255,.85),0 0 16px rgba(255,255,255,.5)}
  html.light-era #hud .era{color:#4a4030;text-shadow:0 1px 2px rgba(255,255,255,.8)}
  html.light-era #beats .b{color:#7a6a52}
  html.light-era #beats .b.on{color:#1a1510}
  html.light-era #beats .b.on .dot{background:#1a1510;box-shadow:0 0 10px rgba(0,0,0,.6)}
  #beats{display:flex;gap:14px;margin-top:6px;font:500 9px/1 var(--mono);letter-spacing:3px;color:#6a5b3e;text-transform:uppercase}
  #beats .b{display:flex;align-items:center;gap:6px;transition:color .4s}
  #beats .b .dot{width:6px;height:6px;border-radius:50%;background:#3a321e;transition:all .4s}
  #beats .b.on{color:var(--accent,#e9c97a)}
  #beats .b.on .dot{background:var(--accent,#e9c97a);box-shadow:0 0 10px var(--accent,#e9c97a);transform:scale(1.3)}
  #beats .b.past .dot{background:#6a5b3e}

  /* ---------- Minimap (graph SVG) ---------- */
  #minimap{position:fixed;top:18px;right:24px;z-index:15;width:330px;padding:12px 14px;background:linear-gradient(180deg,rgba(10,8,6,.82),rgba(10,8,6,.92));border:1px solid rgba(233,201,122,.35);border-radius:2px}
  #minimap .mh{font:500 9px/1 var(--mono);letter-spacing:3px;color:#c5ae7a;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between}
  #minimap .mh .prog{color:#8d7b54}
  #minimap svg{width:100%;height:96px;display:block}
  #minimap .ml{font:500 9px/1.2 var(--mono);letter-spacing:2px;color:#8d7b54;margin-top:6px;text-transform:uppercase;display:flex;justify-content:space-between}

  /* ---------- Plaque (compact diegetic HUD strip) ----------
     The big plaque lives inside the 3D world now (floating in-world panel).
     The DOM strip is just a thin bottom rail with the CTA + meta + paragraph ticker. */
  #plaque{position:fixed;left:50%;bottom:14px;transform:translateX(-50%) translateY(8px);z-index:18;width:min(760px,92vw);opacity:0;pointer-events:none;transition:opacity .5s ease,transform .6s cubic-bezier(.2,.8,.25,1)}
  #plaque.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #plaque .card{display:flex;align-items:center;gap:16px;padding:10px 16px;background:linear-gradient(180deg,rgba(15,12,8,.78),rgba(8,6,4,.82));border:1px solid var(--accent,#e9c97a);border-radius:2px;backdrop-filter:blur(4px);box-shadow:0 10px 28px rgba(0,0,0,.5)}
  #plaque .bin{display:none}  /* portrait & shot now rendered in-world */
  #plaque .port canvas,#plaque .shot canvas{display:none}
  #plaque .tag,#plaque h2,#plaque .headline{display:none}
  #plaque .meta{font:500 10px/1 var(--mono);letter-spacing:2.5px;color:var(--accent,#e9c97a);text-transform:uppercase;white-space:nowrap;flex-shrink:0}
  #plaque .prose{display:flex;flex-direction:row;gap:14px;overflow:hidden;flex:1;min-height:18px;max-height:24px}
  #plaque .prose p{font:400 italic 12.5px/1.4 var(--prose);color:#cdc2a4;opacity:0;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;transition:opacity .5s ease;max-width:100%}
  #plaque .prose p:not(:first-child){display:none}
  #plaque .prose p.on{opacity:0.92}
  #plaque .cta{display:flex;align-items:center;gap:10px;flex-shrink:0}
  #plaque button{pointer-events:auto;font:500 9px/1 var(--mono);letter-spacing:3px;padding:8px 14px;border:1px solid var(--accent,#e9c97a);background:transparent;color:var(--accent,#e9c97a);cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap}
  #plaque button:hover{background:var(--accent,#e9c97a);color:#0a0706}
  #plaque .pg-hint{display:none}

  /* ---------- Playground ---------- */
  #playground{position:fixed;inset:0;z-index:100;background:rgba(5,6,10,.96);display:none;flex-direction:column}
  #playground.open{display:flex;animation:pgin .4s ease}
  @keyframes pgin{from{opacity:0}to{opacity:1}}
  #playground .pgh{height:46px;background:#0a0806;border-bottom:1px solid var(--accent,#e9c97a);display:flex;align-items:center;padding:0 18px;color:var(--accent,#e9c97a);font:500 11px/1 var(--mono);letter-spacing:3px;text-transform:uppercase}
  #playground .pgh button{margin-left:auto;background:transparent;border:1px solid var(--accent,#e9c97a);color:var(--accent,#e9c97a);padding:8px 16px;font:inherit;cursor:pointer;letter-spacing:3px}
  #playground .pgh button:hover{background:var(--accent,#e9c97a);color:#0a0706}
  #playground iframe{flex:1;border:0;background:#fff;width:100%}

  /* ---------- Coda fade & vignette ---------- */
  #vignette{position:fixed;inset:0;z-index:5;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,.55) 100%)}
  #grain{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:.05;mix-blend-mode:overlay;background-image:radial-gradient(#fff 1px,transparent 1.5px);background-size:3px 3px}
  #whitefade{position:fixed;inset:0;z-index:7;pointer-events:none;background:#fff;opacity:0;transition:opacity .6s}

  /* ---------- Scroll hair ---------- */
  #scrollbar{position:fixed;top:0;left:0;right:0;height:2px;z-index:19;pointer-events:none}
  #scrollbar .f{height:100%;background:linear-gradient(90deg,var(--accent,#e9c97a),transparent);width:0%;transition:width .08s linear}

  /* ---------- Reduced motion ---------- */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important;transition-duration:.15s !important}
  }
</style>
</head>

<div id="plaque">

</div>

<div id="playground">

  <iframe id="pg-frame" title="WordPress Playground" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

/* ---------- Pixel portraits (hand-authored 24×32) ---------- */
/* Use string pixel grids — 0=clear, 1=silhouette, 2=highlight, 3=accent, 4=bg-halo */
const PORT = {};
function paintPortrait(key, palette){
  const c = document.createElement("canvas"); c.width=72; c.height=96;
  const g = c.getContext("2d");
  // halo
  const grd = g.createRadialGradient(36,44,6,36,44,56);
  grd.addColorStop(0, rgb(hex(palette[3]),0.4));
  grd.addColorStop(1, rgb(hex(palette[0]),0));
  g.fillStyle = rgb(hex(palette[0])); g.fillRect(0,0,72,96);
  g.fillStyle = grd; g.fillRect(0,0,72,96);
  const sil = PORT_PX[key] || PORT_PX.trumpet;
  const pxW=24, pxH=32, cell=3;
  const ox=(72-pxW*cell)/2, oy=(96-pxH*cell)/2;
  for(let y=0;y<pxH;y++){
    for(let x=0;x<pxW;x++){
      const v = sil[y][x];
      if(v===0) continue;
      let col;
      if(v===1) col = hex(palette[0]);
      else if(v===2) col = hex(palette[3]);
      else if(v===3) col = hex(palette[4]);
      else if(v===4) col = mix(hex(palette[2]), hex(palette[4]), 0.5);
      else col = hex(palette[2]);
      g.fillStyle = rgb(col);
      g.fillRect(ox+x*cell, oy+y*cell, cell, cell);
    }
  }
  // CRT scanlines
  g.globalAlpha = 0.18;
  for(let y=0;y<96;y+=2){ g.fillStyle="#000"; g.fillRect(0,y,72,1); }
  g.globalAlpha = 1;
  return c;
}

/* ---------- Audio engine ---------- */
let AC = null, master = null, reverb=null, convGain=null, dryGain=null;
let audioReady = false;
let activeOsc = [];
let schedulerTimer = null;
let curMovement = -1;
let motifNextTime = 0;
function makeImpulse(len, decay){
  const rate = AC.sampleRate;
  const length = rate * len;
  const imp = AC.createBuffer(2, length, rate);
  for(let ch=0;ch<2;ch++){
    const d = imp.getChannelData(ch);
    for(let i=0;i<length;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/length, decay);
  }
  return imp;
}
function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext||window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0.0; master.connect(AC.destination);
  const comp = AC.createDynamicsCompressor(); comp.threshold.value=-18; comp.ratio.value=4; comp.attack.value=.01; comp.release.value=.25;
  comp.connect(master);
  reverb = AC.createConvolver(); reverb.buffer = makeImpulse(2.8, 2.0);
  convGain = AC.createGain(); convGain.gain.value = 0.45;
  dryGain = AC.createGain(); dryGain.gain.value = 0.9;
  reverb.connect(convGain); convGain.connect(comp); dryGain.connect(comp);
  audioReady = true;
}
function mtof(m){ return 440 * Math.pow(2,(m-69)/12); }
function fadeIn(){
  if(!AC) return;
  master.gain.cancelScheduledValues(AC.currentTime);
  master.gain.setValueAtTime(master.gain.value, AC.currentTime);
  master.gain.linearRampToValueAtTime(0.32, AC.currentTime + 1.8);
}
function playVoice(freq, start, dur, type, gain){
  const o = AC.createOscillator(); o.type = type || "triangle"; o.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(gain||0.08, start + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  o.connect(g); g.connect(dryGain); g.connect(reverb);
  o.start(start); o.stop(start + dur + 0.05);
  activeOsc.push(o);
  if(activeOsc.length>120){ const old = activeOsc.shift(); try{old.stop();}catch{} }
}
function playHat(start, dur, gain){
  const noiseBuf = AC.createBuffer(1, AC.sampleRate*0.1, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 3);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const hp = AC.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=6000;
  const g = AC.createGain(); g.gain.value = gain||0.04;
  src.connect(hp); hp.connect(g); g.connect(dryGain);
  src.start(start); src.stop(start + dur);
}

/* Schedule motif for current movement — voice lead across boundaries */
let motifState = { idx:-1, beat:0, lastChord:null };
function scheduleMotif(now, mIdx, intensity){
  if(!AC) return;
  const m = M[mIdx]; if(!m) return;
  const spb = 60 / m.motif.bpm;
  while(motifNextTime < now + 0.6){
    if(motifNextTime < now) motifNextTime = now + 0.05;
    const t = motifNextTime;
    const chordIdx = motifState.beat % m.motif.chords.length;
    const chord = m.motif.chords[chordIdx];
    const bass = m.motif.bass[chordIdx % m.motif.bass.length];
    const mel = m.motif.mel[motifState.beat % m.motif.mel.length];
    const vol = intensity;
    // bass on the 1
    playVoice(mtof(bass), t, spb*1.6, "sine", 0.10*vol);
    // chord pad voices (triangle)
    for(let i=0;i<chord.length;i++) playVoice(mtof(chord[i]), t+0.02, spb*1.8, "triangle", 0.035*vol);
    // melody on off-beats (sine)
    playVoice(mtof(mel+12), t + spb*0.5, spb*0.9, "sine", 0.08*vol);
    // soft hat on the &
    playHat(t + spb*0.5, 0.1, 0.022*vol);
    if(motifState.beat%2===1) playHat(t + spb*0.75, 0.08, 0.015*vol);
    motifNextTime += spb;
    motifState.beat++;
    motifState.lastChord = chord;
  }
}

/* ---------- Scene paint helpers ---------- */
function fillBackdrop(g, palette, beat){
  // gradient stops derived from palette + beat
  const top = hex(palette[0]);
  const mid = hex(palette[1]);
  const bot = hex(palette[0]);
  const grd = g.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, rgb(top));
  grd.addColorStop(0.5, rgb(mid));
  grd.addColorStop(1, rgb(bot));
  g.fillStyle = grd; g.fillRect(0,0,W,H);
}
function drawDust(g, palette, sub, time){
  g.save();
  for(const p of dust){
    const y = (p.y + time*0.00004*p.z + sub*0.2) % 1;
    const x = (p.x + Math.sin(time*0.0003+p.z*7)*0.02) % 1;
    const sz = p.s * (0.5 + 0.5*p.z);
    g.fillStyle = rgb(hex(palette[3]), p.o*0.35);
    g.beginPath(); g.arc(x*W, y*H, sz, 0, TAU); g.fill();
  }
  g.restore();
}
function vignette(g, strength){
  const grd = g.createRadialGradient(W/2, H*0.5, Math.min(W,H)*0.2, W/2, H*0.5, Math.max(W,H)*0.7);
  grd.addColorStop(0, "rgba(0,0,0,0)");
  grd.addColorStop(1, `rgba(0,0,0,${strength})`);
  g.fillStyle = grd; g.fillRect(0,0,W,H);
}
function rimLight(g, palette, sub, beat){
  const c = hex(palette[3]);
  const a = beat.name==="arrival" ? (0.22 + smooth(beat.frac)*0.35) : (beat.name==="sustained" ? 0.25 : 0.12);
  const grd = g.createRadialGradient(W/2, H*0.45, 40, W/2, H*0.45, Math.max(W,H)*0.9);
  grd.addColorStop(0, rgb(c, a));
  grd.addColorStop(1, rgb(c, 0));
  g.fillStyle = grd; g.fillRect(0,0,W,H);
}
function godrays(g, palette, strength){
  if(strength<=0.01) return;
  g.save(); g.globalCompositeOperation = "screen";
  const cx = W*0.5, cy = H*0.15;
  const c = hex(palette[4]);
  for(let i=0;i<16;i++){
    const ang = -Math.PI/2 + (i-8)*0.08;
    g.beginPath(); g.moveTo(cx,cy);
    const dx = Math.cos(ang)*W, dy = Math.sin(ang)*H*2;
    g.lineTo(cx+dx+30, cy+dy); g.lineTo(cx+dx-30, cy+dy); g.closePath();
    g.fillStyle = rgb(c, 0.02*strength);
    g.fill();
  }
  g.restore();
}

/* ---------- Unified retro-3D raycaster ----------
   Every movement is rendered as a first-person walk through a textured 3D corridor.
   Per-movement config (LVL[v]) supplies: wall-texture key, alcove texture key, ceiling/floor
   gradient, ambient light color, rim-light color, lighting behaviour (torch/neon/fluorescent/sun),
   billboards (portrait / admin mock / fact-tokens), camera mode (walk/orbit/dolly/dutch/macro/zoomout/overhead),
   optional overlays (scanlines, flicker, sun-shaft, starfield, godrays).
   The RENDER[v] entries are thin wrappers that call rayRenderLevel with the movement's LVL config.
*/

/* ---------- Procedural 64×64 wall textures ---------- */
const TEX = {};
function makeTex(name, painter){
  const c = document.createElement("canvas"); c.width=64; c.height=64;
  const g = c.getContext("2d");
  painter(g,64,64);
  TEX[name] = c;
}
function buildWallTextures(){
  // brick — 1.0 Bunker
  makeTex("brick", (g)=>{
    g.fillStyle="#2a1408"; g.fillRect(0,0,64,64);
    for(let row=0; row<8; row++){
      const off = (row%2)*8;
      for(let col=0; col<9; col++){
        const x = col*8 - off;
        const y = row*8;
        const variance = ((row*3 + col*7)%24);
        const r = 110 + variance, gr = 60 + variance/2, b = 34 + variance/4;
        g.fillStyle = `rgb(${r},${gr},${b})`;
        g.fillRect(x+1, y+1, 7, 6);
        // highlight
        g.fillStyle = `rgba(233,181,115,0.15)`;
        g.fillRect(x+1, y+1, 7, 1);
      }
    }
    g.strokeStyle="#150a04"; g.lineWidth=1;
    for(let y=0;y<=64;y+=8){ g.beginPath(); g.moveTo(0,y+0.5); g.lineTo(64,y+0.5); g.stroke(); }
    // soot
    for(let i=0;i<80;i++){ g.fillStyle=`rgba(0,0,0,${Math.random()*0.4})`; g.fillRect((Math.random()*64)|0,(Math.random()*64)|0,1,1); }
  });
  // stone-column — 2.0 Duke
  makeTex("stone", (g)=>{
    g.fillStyle="#3a2f1f"; g.fillRect(0,0,64,64);
    for(let x=0;x<64;x+=8){
      const grd = g.createLinearGradient(x,0,x+8,0);
      grd.addColorStop(0,"#1f1810"); grd.addColorStop(0.5,"#78623f"); grd.addColorStop(1,"#1f1810");
      g.fillStyle=grd; g.fillRect(x,0,8,64);
    }
    // horizontal seams
    g.fillStyle="#15100a"; g.fillRect(0,31,64,1); g.fillRect(0,47,64,1);
    // specks
    for(let i=0;i<120;i++){ g.fillStyle=`rgba(244,223,176,${Math.random()*0.15})`; g.fillRect((Math.random()*64)|0,(Math.random()*64)|0,1,1); }
  });
  // wood-grain — 2.2 Getz
  makeTex("wood", (g)=>{
    g.fillStyle="#0f2a26"; g.fillRect(0,0,64,64);
    for(let y=0;y<64;y++){
      const shade = 0.4 + 0.25*Math.sin(y*0.4) + 0.15*Math.sin(y*1.1 + 3);
      const r=(31*shade)|0, gr=(77*shade+20)|0, b=(68*shade+10)|0;
      g.fillStyle=`rgb(${r},${gr},${b})`;
      g.fillRect(0,y,64,1);
    }
    // vertical plank seams
    for(let x=0;x<=64;x+=32){ g.fillStyle="rgba(0,0,0,0.5)"; g.fillRect(x,0,1,64); }
    // knots

/* ---------- Billboard sprite factory ----------
   Each billboard is a canvas drawn inside the 3D scene at (worldX, worldZ, yOffset) with width,height
   (in world units). Common sprites generated once: pedestal plaque, door glow, cube.
*/
const BB = {};
function makeBB(name, w, h, painter){
  const c = document.createElement("canvas"); c.width=w; c.height=h;
  const g = c.getContext("2d"); painter(g,w,h); BB[name]=c;
}
function buildBillboards(){
  // Framed portrait frame (content filled with per-movement portrait canvas at render time)

    g.strokeStyle="#7a5a2c"; g.lineWidth=4; g.strokeRect(4,4,w-8,h-8);
    g.fillStyle="#3a2814"; g.fillRect(10,10,w-20,h-20);

/* ---------- Level configs ---------- */
// Per-movement map shapes vary width, alcove pattern, and interior pillars so each
// movement reads as its own level, not a texture-swap of the same corridor.
// Values: 0 empty, 1 wall, 2 alcove accent, 3 bright panel.
const LVL = {};
function buildLevels(){
  const Lc=40;
  // shape: "bunker" narrow+alcoves, "library" colonnade pillars, "workshop" broad wood,
  // "lab" wide with cross-vents, "tunnel" narrow arched, "atrium" very wide w/ 4 center columns,
  // "gallery" wide with side-room alcoves, "neon" cyber corridor w/ grid pillars, "void" extra-wide sparse.
  function shapeMap(shape){
    const Wc = (shape==="atrium"||shape==="void"||shape==="gallery") ? 11
             : (shape==="lab"||shape==="neon") ? 9
             : (shape==="library"||shape==="workshop") ? 8
             : 7;
    const m=[];
    for(let z=0; z<Lc; z++){
      const row = new Array(Wc).fill(0);
      row[0]=1; row[Wc-1]=1; // outer walls
      // per-shape features
      if(shape==="bunker"){
        if(z>2 && z<Lc-3 && z%5===0){ row[0]=2; row[Wc-1]=2; }
      } else if(shape==="library"){
        // colonnade: pillar pair every 3 rows
        if(z>3 && z<Lc-3 && z%3===0){ row[2]=1; row[Wc-3]=1; }
        if(z>2 && z<Lc-3 && z%6===0){ row[0]=2; row[Wc-1]=2; }
      } else if(shape==="workshop"){
        // wood panel: slight alcoves
        if(z>3 && z<Lc-3 && z%4===0){ row[0]=2; row[Wc-1]=2; }
      } else if(shape==="lab"){
        // cross-vent pillars mid
        if(z>4 && z<Lc-3 && z%7===0){ row[1]=1; row[Wc-2]=1; }
        if(z>2 && z<Lc-3 && z%5===0){ row[0]=2; row[Wc-1]=2; }
      } else if(shape==="tunnel"){
        // narrow velvet, arched alcoves every 2
        if(z>2 && z<Lc-3 && z%2===0){ row[0]=2; row[Wc-1]=2; }
      } else if(shape==="atrium"){
        // four great columns near center at fixed z
        if(z===10 || z===14){ row[3]=1; row[Wc-4]=1; }
        if(z===18 || z===22){ row[3]=1; row[Wc-4]=1; }
        // shallow alcoves
        if(z>2 && z<Lc-3 && z%5===0){ row[0]=2; row[Wc-1]=2; }
      } else if(shape==="gallery"){
        // side rooms: carve breaks every 5 rows (alcove recessed)
        if(z>3 && z<Lc-3 && z%5===0){ row[0]=2; row[Wc-1]=2; }
      } else if(shape==="neon"){
        // short grid pillars on floor
        if(z>4 && z<Lc-3 && z%4===0){ row[0]=2; row[Wc-1]=2; }
        if(z>4 && z<Lc-4 && z%8===0){ row[2]=1; row[Wc-3]=1; }
      } else if(shape==="void"){
        // very sparse: only a couple of distant pillars
        if(z===10 || z===22){ row[4]=1; row[Wc-5]=1; }
      }
      m.push(row);
    }

/* ---------- Camera path ---------- */
function cameraFor(level, m, sub, beat, time){
  const cam = level.camera;
  const mapW = level.map[0].length;
  const centerX = mapW/2;
  // Scripted walk — but the camera LINGERS during the sustained beat (62% of the
  // movement) so in-world billboards (portrait, plaque, mock, fact-tokens) remain
  // on screen while the camera does theatrical orbit/dolly/dutch work.
  // Phase map: approach 0→0.12 (z 2→8), anticipation+arrival 0.12→0.30 (z 8→10),
  // sustained 0.30→0.92 (z 10→14, slow), departure 0.92→1.00 (z 14→22 rush).
  let camZ;
  if(sub < 0.30)       camZ = 2 + (sub/0.30) * 8;              // 2 → 10
  else if(sub < 0.92)  camZ = 10 + ((sub-0.30)/0.62) * 4;      // 10 → 14 slow crawl
  else                 camZ = 14 + ((sub-0.92)/0.08) * 8;      // 14 → 22 exit push
  let camX = centerX;
  let camAng = 0; // looking +Z
  let fov = cam.fov;
  let roll = 0, yShift = 0;
  // subtle bob
  yShift = Math.sin(time*0.004)* (cam.bob||2) * 0.01;
  // beat FX — approach doorway zoom, arrival punch, departure widen
  if(beat.name==="approach"){
    fov *= 1.0 - (1-beat.frac)*0.18; // emerging from a narrow doorway
  }
  if(beat.name==="arrival"){
    fov *= 1.0 - smooth(beat.frac)*0.10;
  }
  if(beat.name==="departure"){
    fov *= 1.0 + beat.frac*0.14;
  }
  // per-mode camera variation — amplitudes cranked so motion reads at a glance
  if(cam.mode==="orbit"){
    // visible oscillation around the corridor centerline
    camX = centerX + Math.sin(time*0.0012)*2.6;
    camAng = Math.sin(time*0.0012+1)*0.46;
  } else if(cam.mode==="dutch"){
    roll = 0.14 + Math.sin(time*0.0013)*0.11;
    camX = centerX + Math.sin(time*0.0009)*0.5;
  } else if(cam.mode==="dolly"){
    // aggressive dolly-zoom: FOV widens while camera pushes forward
    const t = smooth(sub);
    fov *= lerp(0.62, 1.45, t);
    camAng = Math.sin(time*0.0008)*0.05;
  } else if(cam.mode==="macro"){
    // macro pull: embedded inside a block, pulls all the way back
    fov *= lerp(0.50, 1.30, smooth(sub));
    camZ = lerp(2.0, 26, smooth(sub));
    camX = centerX + Math.sin(time*0.0008)*0.7;
  } else if(cam.mode==="zoomout"){
    // void: breathing zoom with drift
    fov *= lerp(0.65, 1.45, smooth(sub));
    camX = centerX + Math.sin(time*0.0007)*1.6;
    camAng = Math.sin(time*0.0005)*0.08;
    yShift += Math.sin(time*0.0006)*0.03;
  } else if(cam.mode==="macroPush"){
    // 1.0 bunker: camera pushes slowly toward the plaque/portrait while FOV tightens,
    // with a small arc-sway so the room walls scrape past visibly during sustained.
    const t = smooth(sub);
    fov *= lerp(1.05, 0.78, t);
    camX = centerX + Math.sin(time*0.0011)*1.4;
    camAng = Math.sin(time*0.0009)*0.16;
    yShift += Math.sin(time*0.0014)*0.04;
    if(beat.name==="sustained"){
      // additional macro pull-in: amp the push so sustained reads as cinematic dolly
      camZ += beat.frac * 1.2;
    }
  } else if(cam.mode==="overhead"){
    // overhead tilt: horizon pushed higher in frame
    yShift += -0.14 + Math.sin(time*0.0011)*0.03;
    camX = centerX + Math.sin(time*0.0009)*1.0;
    roll = Math.sin(time*0.0007)*0.04;
  } else {
    // plain walk: keep continuous sway + micro-ang so every sustained frame has motion
    const sw = (beat.name==="sustained") ? 1.0 : 0.45;
    camX = centerX + Math.sin(time*0.0008)*0.9*sw;
    camAng = Math.sin(time*0.0007)*0.09*sw;
    yShift += Math.sin(time*0.0011)*0.015*sw;
  }
  return {camX, camZ, camAng, fov, roll, yShift};
}

/* ---------- Renderer core ---------- */
function drawCeilingFloor(g, level, cam, beat, time){
  // horizon adjusted by yShift
  const horizon = H*0.5 + cam.yShift*H + Math.sin(cam.roll)*0 /* handled globally */;
  // ceiling
  const cg = g.createLinearGradient(0,0,0,horizon);
  cg.addColorStop(0, level.ceil[0]); cg.addColorStop(1, level.ceil[1]);
  g.fillStyle = cg; g.fillRect(0,0,W,horizon);
  // floor
  const fg = g.createLinearGradient(0,horizon,0,H);
  fg.addColorStop(0, level.floor[1]); fg.addColorStop(1, level.floor[0]);
  g.fillStyle = fg; g.fillRect(0,horizon,W,H-horizon);
  // floor perspective grid (receding lines)
  g.save();
  g.strokeStyle = `rgba(${level.rim[0]},${level.rim[1]},${level.rim[2]},0.08)`;
  g.lineWidth = 1;
  for(let i=1;i<18;i++){
    const t = i/18;
    const y = horizon + (H-horizon) * (t*t);
    g.beginPath(); g.moveTo(0,y); g.lineTo(W,y); g.stroke();
  }
  // vanishing-point verticals
  const vpx = W*0.5, vpy = horizon;
  for(let i=-6;i<=6;i++){
    g.beginPath(); g.moveTo(vpx + i*60, H); g.lineTo(vpx, vpy); g.stroke();
  }
  g.restore();
  // sky tint if starfield
  if(level.starfield){
    g.save();
    for(let i=0;i<140;i++){
      const sx = (i*137)%W;
      const sy = (i*91)%horizon;
      const a = 0.2 + 0.6*Math.abs(Math.sin(time*0.002+i));
      g.fillStyle = `rgba(255,255,255,${a*0.6})`;
      g.fillRect(sx|0, sy|0, 1, 1);
    }
    g.restore();
  }
  // sun shaft (4.0)
  if(level.sunShaft>0){
    g.save(); g.globalCompositeOperation="screen";
    const cx = W*0.5, cy = H*0.1;
    for(let i=0;i<12;i++){
      const ang = -Math.PI/2 + (i-6)*0.1;
      g.beginPath(); g.moveTo(cx,cy);
      g.lineTo(cx+Math.cos(ang)*W, cy+Math.sin(ang)*H*2);
      g.lineTo(cx+Math.cos(ang)*W+40, cy+Math.sin(ang)*H*2);
      g.closePath();
      g.fillStyle = `rgba(255,230,180,${0.04*level.sunShaft})`;
      g.fill();
    }
    g.restore();
  }
}

function sampleLightIntensity(level, time){
  // returns 0..1 attenuation multiplier on rim lighting
  switch(level.light){
    case "torch":       return 0.85 + 0.15*Math.sin(time*0.017) + 0.1*Math.sin(time*0.041);
    case "candle":      return 0.9 + 0.1*Math.sin(time*0.007);
    case "fluorescent": return 0.97 + 0.03*Math.sin(time*0.08);
    case "pulse":       return 0.7 + 0.3*Math.sin(time*0.003);
    case "neon":        return 0.8 + 0.2*Math.sin(time*0.002 + Math.sin(time*0.01));
    case "sun":         return 1.0;
    case "gallery":     return 1.0;
    case "soft":        return 0.95;
    default: return 1.0;
  }
}

function raycastWalls(g, level, cam, beat, time, zBuf){
  const cols = Math.floor(W/2);
  const halfFovTan = Math.tan(cam.fov/2);
  const mapH = level.map.length;
  const mapW = level.map[0].length;
  const ambient = level.ambient;
  const rim = level.rim;
  const lightFx = sampleLightIntensity(level, time);
  const horizon = H*0.5 + cam.yShift*H;
  const wallScale = H; // wall height scalar
  const fovFactor = 1 / (2*halfFovTan);
  // cos camAng, sin camAng for DDA ray transform
  const cosA = Math.cos(cam.camAng), sinA = Math.sin(cam.camAng);
  for(let col=0; col<cols; col++){
    const screenX = col*2;
    // ray direction in camera space
    const camSpaceX = (2*col/cols - 1) * halfFovTan; // right
    const camSpaceZ = 1; // forward
    // rotate to world
    const rx = camSpaceX*cosA + camSpaceZ*sinA;
    const rz = -camSpaceX*sinA + camSpaceZ*cosA;
    // DDA
    const invRx = rx!==0 ? 1/Math.abs(rx) : 1e9;
    const invRz = rz!==0 ? 1/Math.abs(rz) : 1e9;
    let mx = Math.floor(cam.camX), mz = Math.floor(cam.camZ);
    let sideDistX = (rx<0? (cam.camX - mx) : (mx+1 - cam.camX)) * invRx;
    let sideDistZ = (rz<0? (cam.camZ - mz) : (mz+1 - cam.camZ)) * invRz;
    const stepX = rx<0?-1:1, stepZ = rz<0?-1:1;
    let hit=0, side=0, tile=0;
    for(let step=0; step<64 && !hit; step++){
      if(sideDistX < sideDistZ){ sideDistX += invRx; mx += stepX; side=0; }
      else { sideDistZ += invRz; mz += stepZ; side=1; }
      if(mz<0||mz>=mapH||mx<0||mx>=mapW){ hit=1; tile=1; side = (mz<0||mz>=mapH)?1:0; break; }
      tile = level.map[mz][mx];
      if(tile>0) hit=1;
    }
    // perpendicular distance
    let dist;
    if(side===0) dist = (mx - cam.camX + (1-stepX)/2) / rx;
    else         dist = (mz - cam.camZ + (1-stepZ)/2) / rz;
    dist = Math.max(0.05, Math.abs(dist));
    zBuf[col] = dist;
    // wall strip height
    const lineH = (wallScale / dist);
    let y0 = horizon - lineH/2;
    let y1 = horizon + lineH/2;
    // texture sample position
    let wallHit = (side===0) ? (cam.camZ + dist*rz) : (cam.camX + dist*rx);
    wallHit -= Math.floor(wallHit);
    const texKey = (tile===2) ? level.texAlcove : level.tex;
    const tex = TEX[texKey] || TEX[level.tex];
    const texX = Math.floor(wallHit * 64) % 64;
    // draw textured strip (slice of 1 source px, 2 dest px)
    g.drawImage(tex, texX, 0, 1, 64, screenX, y0, 2, y1-y0);
    // distance shading (dark overlay) + side shading
    const shade = Math.min(0.9, dist * 0.035);
    const sideDark = side===1 ? 0.22 : 0;
    g.fillStyle = `rgba(${ambient[0]*0.3|0},${ambient[1]*0.3|0},${ambient[2]*0.3|0},${shade + sideDark})`;
    g.fillRect(screenX, y0, 2, y1-y0);
    // ambient wash: each era's ambient tint bleeds into walls at a moderate strength
    // so the entire 3D room reads as lit by that era's colour.
    g.fillStyle = `rgba(${ambient[0]},${ambient[1]},${ambient[2]},0.16)`;
    g.fillRect(screenX, y0, 2, y1-y0);
    // rim light injection near camera — stronger so per-era colour reads clearly
    if(dist < 14){
      const rimA = (1 - dist/14) * 0.38 * lightFx;
      g.fillStyle = `rgba(${rim[0]},${rim[1]},${rim[2]},${rimA})`;
      g.fillRect(screenX, y0, 2, y1-y0);
    }
  }
}

function drawBillboards(g, level, cam, beat, time, zBuf, m){
  const cosA = Math.cos(cam.camAng), sinA = Math.sin(cam.camAng);
  const halfFovTan = Math.tan(cam.fov/2);
  const horizon = H*0.5 + cam.yShift*H;
  // collect with transformed coords
  const items = [];
  const mapW = level.map[0].length;
  const centerX = mapW/2;
  for(const b of level.billboards){
    // compute worldX based on side — cap the lateral offset so the sprite stays
    // within the camera cone in wide rooms (atrium/gallery/void mapW=11). Without
    // this, side:"L" at wx=1.1 with centerX=5.5 leaves the sprite ~4.4u off-center
    // and it slides out of frame during sustained.
    let wx;
    const sideOff = 1.9; // max lateral distance from centerline in world units
    if(b.side==="L") wx = Math.max(1.2, centerX - sideOff);
    else if(b.side==="R") wx = Math.min(mapW - 1.2, centerX + sideOff);
    else wx = centerX + (b.offset||0);
    // Shift all billboard world-z forward by +10 so that while the camera lingers at
    // camZ≈10..14 during sustained, billboards originally authored at z:8..24 land at
    // z:18..34 — comfortably ahead of the camera (4–8u min) so they don't crash the
    // foreground when camZ reaches 14.
    let wz = b.z + 10;
    // dynamic motion: bob (vertical), slide (lateral dock-in), orbit (circular)
    let dynYOff = 0;
    if(b.bob) dynYOff += Math.sin(time*0.002 + b.z*0.7) * b.bob;
    if(b.slide){
      // widgets sliding/docking from farther z toward target as sustained progresses
      const t = clamp((beat.name==="sustained"?beat.frac:beat.name==="departure"?1:0), 0, 1);
      wz += (b.slide) * (1 - t) * 3; // starts further, docks closer
    }
    if(b.orbitR){
      const ang = time * (b.orbitSpeed||0.001);
      wx += Math.cos(ang) * b.orbitR;
      wz += Math.sin(ang) * b.orbitR * 0.6;
    }
    if(b.assemble){
      // 5.0 Gutenberg blocks: start scattered to the sides + above, assemble toward center & home Y
      const t = clamp(beat.name==="approach"?0 : beat.name==="anticipation"?beat.frac*0.4 : beat.name==="arrival"?0.4+beat.frac*0.4 : beat.name==="sustained"?Math.min(1, 0.8+beat.frac*0.5) : 1, 0, 1);
      const tt = 1 - t; // 1 = scattered, 0 = assembled
      const phase = b.assemble || 0;
      wx += Math.sin(phase) * 3.5 * tt;
      dynYOff += (Math.cos(phase) * 1.6 + 1.2) * tt;
      wz += Math.cos(phase*1.3) * 2.2 * tt;
      // snap pulse near assembly
      if(t>0.7){ dynYOff += Math.sin(time*0.005 + phase)*0.08; }
    }
    const dx = wx - cam.camX, dz = wz - cam.camZ;
    // rotate into camera space
    const tz = dx*sinA + dz*cosA; // forward
    const tx = dx*cosA - dz*sinA; // right
    if(tz<=0.1) continue;
    const scale = H / tz;
    const spriteCanvas = resolveSprite(b, m, beat, time);
    if(!spriteCanvas) continue;
    const wW = (b.w||1.6) * scale;
    const hH = (b.h||2.0) * scale;
    const screenX = W/2 + (tx / tz) * (W/2 / halfFovTan);
    // y offset from wall center
    const yCenter = horizon - hH/2 + ((b.yOff||0) + dynYOff) * scale;
    items.push({spriteCanvas, screenX, yCenter, wW, hH, dist:tz, b});
  }
  items.sort((a,b)=> b.dist - a.dist);
  for(const it of items){
    const x0 = Math.floor(it.screenX - it.wW/2);
    const x1 = Math.ceil(it.screenX + it.wW/2);
    // per-column z-test
    for(let sx=x0; sx<x1; sx+=2){
      const col = Math.floor(sx/2);
      if(col<0||col>=zBuf.length) continue;
      if(it.dist > zBuf[col]) continue;
      const u = (sx - (it.screenX - it.wW/2)) / it.wW;
      if(u<0||u>1) continue;
      const srcX = Math.floor(u * it.spriteCanvas.width);
      g.drawImage(it.spriteCanvas, srcX, 0, 1, it.spriteCanvas.height, sx, it.yCenter, 2, it.hH);
    }
  }
}

/* Per-movement plaque canvases (floating in-world panel that the camera focuses on
   during the sustained beat — replaces the bottom DOM card as the "diegetic plaque"). */
const PLAQ = {};
function buildPlaques(){
  for(const m of M){
    const c = document.createElement("canvas"); c.width=360; c.height=200;
    const g = c.getContext("2d");
    const p = m.palette;
    // parchment / plate background tinted to era
    const bg = mix(hex(p[0]), [0,0,0], 0.2);
    g.fillStyle = rgb(bg); g.fillRect(0,0,360,200);
    // frame
    g.strokeStyle = rgb(hex(p[3])); g.lineWidth=3; g.strokeRect(3,3,354,194);
    g.strokeStyle = rgb(hex(p[2])); g.lineWidth=1; g.strokeRect(8,8,344,184);
    // header bar
    g.fillStyle = rgb(hex(p[3]),0.28); g.fillRect(8,8,344,28);
    g.fillStyle = rgb(hex(p[4])); g.font="700 12px 'IBM Plex Mono',monospace";
    g.fillText(`WORDPRESS ${m.v}  ·  ${m.date}`, 16, 26);
    // title
    g.fillStyle = rgb(hex(p[4])); g.font = "400 26px 'Didot',Georgia,serif";
    g.fillText(`${m.era}`, 16, 66);
    g.fillStyle = rgb(hex(p[3])); g.font = "400 italic 13px 'Iowan Old Style',Georgia,serif";
    g.fillText(`"${m.name}" — ${m.musician}`, 16, 86);
    // headline (wrap naive)
    g.fillStyle = rgb(mix(hex(p[3]),hex(p[4]),0.5)); g.font="400 13px 'Iowan Old Style',Georgia,serif";
    const words = m.headline.split(" ");
    let line="", ly=116;
    for(const w of words){
      const test = line + w + " ";
      if(g.measureText(test).width > 330 && line.length>0){ g.fillText(line, 16, ly); line = w + " "; ly += 18; }
      else line = test;
    }
    g.fillText(line, 16, ly);
    // register tag
    g.fillStyle = rgb(hex(p[3])); g.font="500 10px 'IBM Plex Mono',monospace";
    g.fillText(m.register.toUpperCase(), 16, 188);
    PLAQ[m.v] = c;
  }
}

function resolveSprite(b, m, beat, time){
  if(b.kind==="plaque"){
    return PLAQ[m.v] || null;
  }
  if(b.kind==="portrait"){
    // composite: frame + portrait
    const frame = BB.frame;
    const c = document.createElement("canvas"); c.width=frame.width; c.height=frame.height;
    const g = c.getContext("2d");
    g.drawImage(frame,0,0);
    if(PORT[m.portraitKey]) g.drawImage(PORT[m.portraitKey], 15, 25, c.width-30, c.height-50);
    // era nameplate
    g.fillStyle="#e9c97a"; g.font="700 9px IBM Plex Mono,monospace"; g.textAlign="center";
    g.fillText(m.musician.split(" (")[0].toUpperCase(), c.width/2, c.height-6);
    g.textAlign="left";
    return c;
  } else if(b.kind==="mock"){
    // framed admin mock
    const frame = BB[b.frame || "crt"];
    const shot = SHOT[m.adminKey];
    if(!frame||!shot) return null;
    const c = document.createElement("canvas"); c.width=frame.width; c.height=frame.height;
    const g = c.getContext("2d");
    g.drawImage(frame,0,0);
    g.drawImage(shot, 8, 8, c.width-16, c.height-28);
    // scanline overlay
    g.globalAlpha=0.2;
    for(let y=8;y<c.height-20;y+=3){ g.fillStyle="#000"; g.fillRect(8,y,c.width-16,1); }
    g.globalAlpha=1;
    // label
    g.fillStyle="#e9c97a"; g.font="700 8px IBM Plex Mono,monospace"; g.fillText(b.frame==="gilt"?"DISPLAY":b.frame==="holo"?"HOLO":"MONITOR", 10, c.height-5);
    return c;
  } else if(b.kind==="sprite"){
    return BB[b.spr] || null;
  } else if(b.kind==="widget"){
    return BB[b.spr] || null;
  } else if(b.kind==="floor"){
    return BB[b.spr] || null;
  } else if(b.kind==="cube"){
    return BB[b.spr] || null;
  } else if(b.kind==="planet"){
    return BB.planet;
  } else if(b.kind==="moon"){
    return BB.moon;
  }
  return null;
}

/* ---------- Overlays ---------- */
function drawTorchFlicker(g, level, time, beat){
  const s = sampleLightIntensity(level, time);
  const a = (1-s) * 0.35;
  g.fillStyle = `rgba(${level.ambient[0]},${level.ambient[1]},${level.ambient[2]},${a})`;
  g.fillRect(0,0,W,H);
}
function drawScanlines(g, strength){
  g.save(); g.globalAlpha = strength * 0.2;
  g.fillStyle="#000";
  for(let y=0;y<H;y+=3) g.fillRect(0,y,W,1);
  g.restore();
}
function drawUploadRain(g, level, time, sub){
  // 3.3 — files rising from floor to ceiling
  const upfile = BB.upfile;
  g.save();
  for(let i=0;i<32;i++){
    const phase = ((time*0.0003 + i*0.21) % 1);
    const x = ((i*83)%W);
    const y = lerp(H*1.05, -40, phase);
    const s = 0.7 + (i%3)*0.2;
    g.globalAlpha = Math.sin(phase*Math.PI) * 0.85;
    g.drawImage(upfile, x, y, upfile.width*s, upfile.height*s);
  }
  g.restore();
}

function drawRoll(g, roll){
  // implemented by saving and rotating context prior to the scene: handled by wrapper
}

function drawLabel(g, level, m, beat){
  if(beat.name!=="arrival") return;
  const k = ease(beat.frac);
  g.save();
  g.globalAlpha = k;
  g.fillStyle = `rgb(${level.rim[0]},${level.rim[1]},${level.rim[2]})`;
  g.font = "400 58px Didot, Georgia, serif"; g.textAlign="center";
  if(level.light==="neon"){
    g.shadowColor = `rgb(${level.rim[0]},${level.rim[1]},${level.rim[2]})`;
    g.shadowBlur = 24;
  }
  g.fillText(`${m.v} · ${m.name.toUpperCase()}`, W/2, H*0.17 + (1-k)*20);
  g.restore();
  g.textAlign="left";
}

function drawDoorway(g, level, m, beat, time){
  // Departure: a bright archway opens at the corridor end, tinted by the next movement.
  if(beat.name!=="departure") return;
  const k = ease(beat.frac);
  const next = findNextM(m);
  const tint = next ? hex(next.palette[2]) : [255,230,180];
  g.save();
  // dark outer frame squeezes in as the camera accelerates toward the doorway
  g.fillStyle = `rgba(0,0,0,${0.25 + 0.5*k})`; g.fillRect(0,0,W,H);
  // then punch a bright arched portal in the middle
  g.globalCompositeOperation = "destination-out";
  const aw = W * (0.20 + 0.45*k);
  const ah = H * (0.45 + 0.4*k);
  g.beginPath();
  g.moveTo(W/2 - aw, H);
  g.lineTo(W/2 - aw, H/2 - ah*0.3);
  g.arc(W/2, H/2 - ah*0.3, aw, Math.PI, 0, false);
  g.lineTo(W/2 + aw, H);
  g.closePath();
  g.fill();
  // paint a next-movement glow through the portal
  g.globalCompositeOperation = "source-over";
  const rg = g.createRadialGradient(W/2, H/2, 10, W/2, H/2, Math.max(aw,ah));
  rg.addColorStop(0, `rgba(${tint[0]},${tint[1]},${tint[2]},${0.35+0.5*k})`);
  rg.addColorStop(1, "rgba(0,0,0,0)");
  g.fillStyle = rg; g.fillRect(0,0,W,H);
  // rim outline
  g.strokeStyle = `rgba(${tint[0]},${tint[1]},${tint[2]},${0.6+0.3*k})`;
  g.lineWidth = 2 + 4*k;
  g.beginPath();
  g.moveTo(W/2 - aw, H);
  g.lineTo(W/2 - aw, H/2 - ah*0.3);
  g.arc(W/2, H/2 - ah*0.3, aw, Math.PI, 0, false);
  g.lineTo(W/2 + aw, H);
  g.stroke();
  g.restore();
}
function findNextM(m){
  const idx = M.findIndex(x=>x.v===m.v);
  return idx>=0 && idx+1<M.length ? M[idx+1] : null;
}

function drawDoorwayApproach(g, level, m, beat, time){
  // Approach: a visible arched doorway frames the scene and dilates open as we emerge.
  if(beat.name!=="approach") return;
  const k = 1 - ease(beat.frac);   // k=1 at start (doorway tight), k=0 at end (open)
  if(k<=0) return;
  g.save();
  // outside-the-doorway black mask shaped like an arched portal — starts nearly
  // closed (tight arch) and dilates open as we step through
  const ah = H * (0.28 + 0.65*(1-k));  // arch height
  const aw = W * (0.22 + 0.72*(1-k));  // arch half-width
  g.fillStyle = `rgba(0,0,0,${0.75 + 0.2*k})`;
  g.beginPath();
  g.moveTo(0,0); g.lineTo(W,0); g.lineTo(W,H); g.lineTo(0,H); g.closePath();
  // subtract the archway
  g.moveTo(W/2 - aw, H);
  g.lineTo(W/2 - aw, H/2 - ah*0.4);
  g.arc(W/2, H/2 - ah*0.4, aw, Math.PI, 0, true);
  g.lineTo(W/2 + aw, H);
  g.closePath();
  g.fill("evenodd");
  // warm rim glow on the archway edge
  const rim = level.rim;
  g.strokeStyle = `rgba(${rim[0]},${rim[1]},${rim[2]},${0.7+0.3*k})`;
  g.lineWidth = 3 + 8*k;
  g.beginPath();
  g.moveTo(W/2 - aw, H);
  g.lineTo(W/2 - aw, H/2 - ah*0.4);
  g.arc(W/2, H/2 - ah*0.4, aw, Math.PI, 0, false);
  g.lineTo(W/2 + aw, H);
  g.stroke();
  g.restore();
}

/* ---------- Unified level renderer ---------- */
function rayRenderLevel(g, sub, beat, time, m){
  const level = LVL[m.v];
  if(!level) return;
  const cam = cameraFor(level, m, sub, beat, time);
  // roll wrap
  if(cam.roll){
    g.save();
    g.translate(W/2, H/2);
    g.rotate(cam.roll);
    g.translate(-W/2, -H/2);
  }
  drawCeilingFloor(g, level, cam, beat, time);
  const zBuf = new Float32Array(Math.floor(W/2));
  raycastWalls(g, level, cam, beat, time, zBuf);
  drawBillboards(g, level, cam, beat, time, zBuf, m);
  // overlays
  if((level.overlays||[]).includes("torchflicker")) drawTorchFlicker(g, level, time, beat);
  if((level.overlays||[]).includes("uploadRain")) drawUploadRain(g, level, time, sub);
  if(level.scanlines) drawScanlines(g, level.scanlines);
  // transitions
  drawDoorwayApproach(g, level, m, beat, time);
  drawDoorway(g, level, m, beat, time);
  // label on arrival
  drawLabel(g, level, m, beat);
  // rim/vignette
  g.save();
  const vg = g.createRadialGradient(W/2, H*0.5, Math.min(W,H)*0.3, W/2, H*0.5, Math.max(W,H)*0.75);
  vg.addColorStop(0,"rgba(0,0,0,0)");
  vg.addColorStop(1, level.light==="gallery"||level.light==="soft" ? "rgba(20,30,50,0.25)" : "rgba(0,0,0,0.5)");
  g.fillStyle = vg; g.fillRect(0,0,W,H);
  g.restore();
  drawDust(g, m.palette, sub, time);
  if(cam.roll){ g.restore(); }
}

/* ---------- RENDER dispatch (all point to unified renderer) ---------- */
const RENDER = {};
["1.0","2.0","2.2","3.0","3.3","4.0","5.0","6.0","7.0"].forEach(v=>{
  RENDER[v] = function(g, sub, beat, time, m){ rayRenderLevel(g, sub, beat, time, m); };
});
// legacy no-op stubs to preserve reachability should old code reference them
const _RENDER_LEGACY_UNUSED_ = null;


/* Overture */
function renderOverture(g, t, time){
  // fade from pure black through palette 1.0
  const p = M[0].palette;
  const grd = g.createRadialGradient(W/2,H/2,10,W/2,H/2,Math.max(W,H));
  grd.addColorStop(0, rgb(hex(p[1]), t));
  grd.addColorStop(1, rgb([5,6,10]));
  g.fillStyle = grd; g.fillRect(0,0,W,H);
  // title
  g.save();
  g.globalAlpha = 1 - t*0.7;
  g.fillStyle = "#f4ecd6";
  g.font = "400 62px Didot,Georgia,serif"; g.textAlign="center";
  g.fillText("Nine Movements", W/2, H*0.42);
  g.font = "400 italic 15px 'Iowan Old Style',Georgia,serif";
  g.fillStyle = "#c5ae7a";
  g.fillText("a suite in nine parts for the WordPress Museum", W/2, H*0.48);
  g.font = "500 10px IBM Plex Mono,monospace";
  g.fillStyle = "#8d7b54";
  g.fillText("1.0  ·  2.0  ·  2.2  ·  3.0  ·  3.3  ·  4.0  ·  5.0  ·  6.0  ·  7.0", W/2, H*0.55);
  g.restore();
  drawDust(g, p, t, time);
}

/* Coda */
function renderCoda(g, t, time){
  const p = M[M.length-1].palette;
  const grd = g.createRadialGradient(W/2,H/2,10,W/2,H/2,Math.max(W,H));
  grd.addColorStop(0, rgb(hex(p[0])));
  grd.addColorStop(1, rgb(mix(hex(p[0]), [255,255,255], t)));
  g.fillStyle = grd; g.fillRect(0,0,W,H);
  g.save();
  g.globalAlpha = 1-t*0.4;
  g.fillStyle = "#3a4254";
  g.textAlign="center";
  g.font = "400 italic 17px 'Iowan Old Style',Georgia,serif";
  g.fillText("the suite continues, elsewhere.", W/2, H*0.46);
  g.font = "500 10px IBM Plex Mono,monospace";
  g.fillStyle = "#7a8299";
  g.fillText("— end —", W/2, H*0.52);
  g.restore();
  // fade to pure white
  document.getElementById("whitefade").style.opacity = String(t*0.5);
}

/* ---------- Scene dispatch ---------- */
function getBeat(sub){
  for(let i=0;i<BEATS.length;i++){
    const b = BEATS[i];
    if(sub >= b.a && sub <= b.b){
      const frac = (sub - b.a) / (b.b - b.a);
      return {name:b.key, frac, i};
    }
  }
  return {name:"departure", frac:1, i:4};
}
function scrollToMovement(y){
  if(y < OVERTURE) return {m:-1, sub:y/OVERTURE};
  if(y > OVERTURE + M.length*MLEN) return {m:M.length, sub:(y-OVERTURE-M.length*MLEN)/CODA};
  const idx = Math.floor((y - OVERTURE)/MLEN);
  const sub = ((y - OVERTURE) - idx*MLEN)/MLEN;
  return {m:idx, sub};
}

/* ---------- UI updates ---------- */
function setAccent(color){
  document.documentElement.style.setProperty("--accent", color);
}
function updateHUD(curM, sub, beat){
  const rel = document.getElementById("h-release");
  const mvt = document.getElementById("h-movement");
  const eraE = document.getElementById("h-era");
  if(curM<0){
    rel.textContent = "OVERTURE"; mvt.textContent = "Nine Movements"; eraE.textContent = "WORDPRESS · 2003 → 2026";
  } else if(curM>=M.length){
    rel.textContent = "CODA"; mvt.textContent = "— end —"; eraE.textContent = "after the ninth movement";
  } else {
    const m = M[curM];
    rel.textContent = `WORDPRESS ${m.v} · ${m.musician}`;
    mvt.textContent = m.era;
    eraE.textContent = `${m.date} · ${m.register}`;
    setAccent(m.palette[3]);
    const lightEra = (m.v==="4.0" || m.v==="5.0" || m.v==="7.0");
    document.documentElement.classList.toggle("light-era", lightEra);
  }
  const bnodes = document.querySelectorAll("#beats .b");
  bnodes.forEach((el,i)=>{
    el.classList.remove("on","past");
    if(curM<0||curM>=M.length) return;
    if(i===beat.i) el.classList.add("on");
    else if(i<beat.i) el.classList.add("past");
  });
}
function updateMinimap(y, curM, sub){
  const pct = clamp(y/TOTAL, 0, 1);
  document.getElementById("m-prog").textContent = String(Math.floor(pct*100)).padStart(2,"0")+"%";
  const svg = document.getElementById("m-svg");
  const sx = (i)=> 18 + (320-36)*(i/(M.length-1));
  const pulse = document.getElementById("mpulse");
  if(pulse){
    let x;
    if(curM<0) x = sx(0);
    else if(curM>=M.length) x = sx(M.length-1);
    else x = lerp(sx(curM), sx(Math.min(M.length-1, curM+1)), sub);
    pulse.setAttribute("cx", x);
    const r = 6 + 2*Math.sin(Date.now()*0.005);
    pulse.setAttribute("r", r);
  }
  // highlight current node
  for(let i=0;i<M.length;i++){
    const n = document.getElementById("mnode"+i);
    if(!n) continue;
    if(i===curM){ n.setAttribute("fill", M[i].palette[3]); n.setAttribute("r","5"); }
    else if(i<curM){ n.setAttribute("fill", M[i].palette[3]+"aa" /*not valid but browsers ignore*/); n.setAttribute("fill-opacity","0.8"); n.setAttribute("r","4"); }
    else { n.setAttribute("fill", "#0a0806"); n.setAttribute("r","4"); n.setAttribute("fill-opacity","1");}
  }
  const fromE = document.getElementById("m-from"); const toE = document.getElementById("m-to");
  if(curM<0){ fromE.textContent="overture"; toE.textContent=M[0].era; }
  else if(curM>=M.length){ fromE.textContent=M[M.length-1].era; toE.textContent="coda"; }
  else {
    fromE.textContent = M[curM].era;
    toE.textContent = curM+1<M.length ? M[curM+1].era : "coda";
  }
}

/* ---------- Plaque ---------- */
let plaqueState = { curM:-1 };
function updatePlaque(curM, sub, beat){
  const plaque = document.getElementById("plaque");
  const shouldShow = curM>=0 && curM<M.length && (beat.name==="arrival" || beat.name==="sustained" || (beat.name==="departure" && beat.frac<0.4));
  if(shouldShow){
    if(plaqueState.curM !== curM){
      plaqueState.curM = curM;
      const m = M[curM];
      document.getElementById("p-meta").textContent = `WORDPRESS ${m.v} · ${m.date} · ${m.musician}`;
      document.getElementById("p-name").textContent = `${m.era} — "${m.name}"`;
      document.getElementById("p-headline").textContent = m.headline;
      document.getElementById("p-tag").textContent = `${m.adminKey.toUpperCase()} · ERA MOCK`;
      // portrait
      const portCanvas = document.getElementById("p-port");
      const pg = portCanvas.getContext("2d"); pg.clearRect(0,0,72,96);
      if(PORT[m.portraitKey]) pg.drawImage(PORT[m.portraitKey], 0, 0);
      // shot
      const shotCanvas = document.getElementById("p-shot");
      const sg = shotCanvas.getContext("2d"); sg.clearRect(0,0,280,140);
      if(SHOT[m.adminKey]) sg.drawImage(SHOT[m.adminKey], 0, 0);
      // prose
      const proseEl = document.getElementById("p-prose");
      proseEl.innerHTML = m.paras.map((t,i)=>`<p data-i="${i}">${t}</p>`).join("");
      // CTA
      const btn = document.getElementById("p-btn");
      btn.dataset.v = m.v;
    }
    plaque.classList.add("show");
    plaque.style.setProperty("--accent", M[curM].palette[3]);
    // Cycle paragraphs one-at-a-time through the sustained beat
    const paras = document.querySelectorAll("#p-prose p");
    const reveal = beat.name==="arrival" ? 0 : (beat.name==="sustained" ? beat.frac : 1);
    const idx = Math.min(paras.length-1, Math.floor(reveal * paras.length));
    paras.forEach((el,i)=>{
      el.style.display = (i===idx) ? "block" : "none";
      el.classList.toggle("on", i===idx);
    });
  } else {
    plaque.classList.remove("show");
    if(!shouldShow) plaqueState.curM = -1;
  }
}

/* ---------- Playground ---------- */
document.getElementById("p-btn").addEventListener("click", (e)=>{
  const v = e.currentTarget.dataset.v;
  if(!v) return;
  const frame = document.getElementById("pg-frame");
  frame.src = `https://playground.wordpress.net/?wp=${encodeURIComponent(v)}`;
  document.getElementById("pg-title").textContent = `PLAYGROUND · WordPress ${v}`;
  document.getElementById("playground").classList.add("open");
});
document.getElementById("pg-close").addEventListener("click", ()=>{
  document.getElementById("playground").classList.remove("open");
  document.getElementById("pg-frame").src = "about:blank";
});

/* ---------- Scrollbar hairline ---------- */
function updateScrollbar(){
  const pct = clamp(scrollSmooth/TOTAL, 0, 1);
  document.getElementById("sf").style.width = (pct*100)+"%";
}

/* ---------- Main loop ---------- */
let rafId = 0;
let lastT = 0;
let started = false;
let fpsAcc = 0, fpsN = 0, fps = 60;
function frame(t){
  const dt = Math.min(50, t-lastT); lastT = t;
  fpsAcc += 1000/(Math.max(1,dt)); fpsN++;
  if(fpsN>30){ fps = fpsAcc/fpsN; fpsAcc=0; fpsN=0; }

  scrollSmooth += (scrollTarget - scrollSmooth) * 0.12;
  const y = scrollSmooth;
  const st = scrollToMovement(y);

  ctx.save();
  // camera breathing
  const breath = Math.sin(t*0.0008)*2;
  ctx.translate(0, breath);

  ctx.fillStyle = "#05060a"; ctx.fillRect(0,0,W,H);

  let beat = {name:"approach",frac:0,i:0};
  let curM = -1;
  if(st.m < 0){
    renderOverture(ctx, smooth(st.sub), t);
    curM = -1;
  } else if(st.m >= M.length){
    renderCoda(ctx, smooth(st.sub), t);
    curM = M.length;
  } else {
    curM = st.m;
    beat = getBeat(st.sub);
    const fn = RENDER[M[curM].v] || RENDER["1.0"];
    fn(ctx, st.sub, beat, t, M[curM]);
  }

  ctx.restore();

  // UI overlays
  updateHUD(curM, st.sub, beat);
  updateMinimap(y, curM, st.sub);
  updatePlaque(curM, st.sub, beat);
  updateScrollbar();

  // Audio scheduling — movement change + motif
  if(audioReady && curM>=0 && curM<M.length){
    if(curM !== curMovement){
      curMovement = curM;
      motifState.beat = 0; motifNextTime = AC.currentTime + 0.2;
    }
    const intensity = beat.name==="approach"? 0.25 : beat.name==="anticipation"? 0.55 : beat.name==="arrival"? 1.0 : beat.name==="sustained"? 0.85 : 0.45;
    scheduleMotif(AC.currentTime, curM, intensity);
  }

  rafId = requestAnimationFrame(frame);
}

/* ---------- Boot sequence ---------- */
function bootProgress(p){ document.getElementById("bootf").style.width = (p*100)+"%"; }
function boot(){
  let p = 0;
  bootProgress(0.05);
  // stage 1: portraits
  setTimeout(()=>{ buildPortraits(); buildWallTextures(); bootProgress(0.4);
    // stage 2: admin mocks + billboards + levels
    setTimeout(()=>{ buildAdminMocks(); buildBillboards(); buildLevels(); buildPlaques(); bootProgress(0.7);
      // stage 3: minimap
      setTimeout(()=>{ buildMinimap(); bootProgress(0.95);
        setTimeout(()=>{ bootProgress(1.0);
          setTimeout(()=>{ document.getElementById("boot").classList.add("gone"); }, 500);
        }, 160);
      }, 120);
    }, 120);
  }, 180);
}
boot();
rafId = requestAnimationFrame(frame);

/* ---------- Start / audio unlock on first gesture ---------- */
function startOnce(){
  if(started) return; started = true;
  try { initAudio(); fadeIn(); } catch(e){ console.warn("audio init failed", e); }
  const sp = document.getElementById("splash");
  if(sp) sp.classList.add("gone");
}
window.addEventListener("click", startOnce, {once:false});
window.addEventListener("keydown", (e)=>{ if(e.key===" "||e.key==="Enter") startOnce(); });
window.addEventListener("wheel", startOnce, {once:true, passive:true});
window.addEventListener("touchstart", startOnce, {once:true, passive:true});

/* ---------- Splash ---------- */
(function makeSplash(){
  const div = document.createElement("div");
  div.id = "splash";
  div.innerHTML = `
    <div class="slab">
      <span class="k">WordPress Museum · Presentation · V10</span>
      <h1>Nine Movements</h1>
      <div class="subtitle">a suite of nine, in the key of a platform</div>
      <p>Each major WordPress release — <em>1.0, 2.0, 2.2, 3.0, 3.3, 4.0, 5.0, 6.0, 7.0</em> — is a movement in five beats: approach, anticipation, arrival, the sustained moment, departure. Scroll is the baton. Click to begin.</p>
      <div class="cta"><span class="pulse"></span>click · scroll · listen</div>
    </div>
  `;
  document.body.appendChild(div);
})();
</script>

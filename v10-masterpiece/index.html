<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WordPress Museum · v10 · Nine Movements</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --display:"Didot","Bodoni 72",Georgia,"Times New Roman",serif;
    --prose:"Iowan Old Style","Palatino Linotype","Palatino","Book Antiqua",Georgia,serif;
    --mono:"IBM Plex Mono","JetBrains Mono","Menlo",ui-monospace,monospace;
    --ui:"Inter","SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --ink:#f2eee4;
    --accent:#e9c97a;
  }
  html,body{background:#05060a;color:var(--ink);font-family:var(--ui);overflow-x:hidden;-webkit-font-smoothing:antialiased}
  body{height:16100px}

  /* ---------- Stage ---------- */
  #stage{position:fixed;inset:0;z-index:1;background:#05060a;overflow:hidden}
  #stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #breath{position:fixed;inset:-2% -2% -2% -2%;z-index:1;pointer-events:none;will-change:transform}

  /* ---------- Loading splash ---------- */
  #boot{position:fixed;inset:0;z-index:80;background:#05060a;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:opacity .7s}
  #boot.gone{opacity:0;pointer-events:none}
  #boot .ring{position:absolute;width:280px;height:280px;border-radius:50%;border:1px solid rgba(233,201,122,.3);animation:spin 8s linear infinite}
  #boot .ring:nth-child(2){width:220px;height:220px;border-color:rgba(233,201,122,.18);animation-duration:14s;animation-direction:reverse}
  #boot .ring:nth-child(3){width:160px;height:160px;border-color:rgba(233,201,122,.1);animation-duration:20s}
  #boot .core{position:relative;text-align:center;z-index:1}
  #boot .core .mark{font:400 10px/1 var(--mono);letter-spacing:4px;color:#c5ae7a;opacity:.7;margin-bottom:18px}
  #boot .core .title{font:400 34px/1 var(--display);letter-spacing:2px;color:#f4ecd6}
  #boot .core .sub{font:400 10px/1.8 var(--mono);letter-spacing:3px;margin-top:18px;color:#8d7b54;text-transform:uppercase}
  #boot .bar{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);width:240px;height:1px;background:rgba(233,201,122,.18)}
  #boot .bar .f{position:absolute;left:0;top:0;bottom:0;width:0%;background:#e9c97a;transition:width .25s ease}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- Start splash ---------- */
  #splash{position:fixed;inset:0;z-index:70;background:radial-gradient(ellipse at 50% 40%,#1b120a,#05060a 65%);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .7s}
  #splash.gone{opacity:0;pointer-events:none}
  #splash .slab{text-align:center;max-width:640px;padding:44px 40px;border-top:1px solid rgba(233,201,122,.4);border-bottom:1px solid rgba(233,201,122,.4)}
  #splash .k{font:400 10px/1 var(--mono);letter-spacing:5px;color:#c5ae7a;text-transform:uppercase;display:block;margin-bottom:20px}
  #splash h1{font:400 52px/1.05 var(--display);letter-spacing:3px;color:#f4ecd6;margin-bottom:8px}
  #splash .subtitle{font:400 italic 16px/1.4 var(--prose);color:#c8bfa6;margin-bottom:28px}
  #splash p{font:400 13px/1.7 var(--prose);color:#b9af95;margin:0 auto;max-width:480px}
  #splash .cta{font:500 10px/1 var(--mono);letter-spacing:6px;color:#e9c97a;margin-top:26px;text-transform:uppercase}
  #splash .cta .pulse{display:inline-block;width:8px;height:8px;background:#e9c97a;border-radius:50%;margin-right:10px;vertical-align:middle;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}

  /* ---------- HUD ---------- */
  #hud{position:fixed;top:0;left:0;right:0;z-index:15;pointer-events:none;padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--ui)}
  #hud .left{display:flex;flex-direction:column;gap:10px}
  #hud .release{font:400 13px/1 var(--mono);letter-spacing:4px;color:#c5ae7a;text-transform:uppercase}
  #hud .movement{font:400 28px/1 var(--display);letter-spacing:1.5px;color:var(--accent,#e9c97a);text-shadow:0 0 18px rgba(233,201,122,.25);transition:color .8s,text-shadow .8s}
  #hud .era{font:400 10px/1 var(--mono);letter-spacing:3px;color:#8d7b54;text-transform:uppercase}
  #beats{display:flex;gap:14px;margin-top:6px;font:500 9px/1 var(--mono);letter-spacing:3px;color:#6a5b3e;text-transform:uppercase}
  #beats .b{display:flex;align-items:center;gap:6px;transition:color .4s}
  #beats .b .dot{width:6px;height:6px;border-radius:50%;background:#3a321e;transition:all .4s}
  #beats .b.on{color:var(--accent,#e9c97a)}
  #beats .b.on .dot{background:var(--accent,#e9c97a);box-shadow:0 0 10px var(--accent,#e9c97a);transform:scale(1.3)}
  #beats .b.past .dot{background:#6a5b3e}

  /* ---------- Minimap (graph SVG) ---------- */
  #minimap{position:fixed;top:18px;right:24px;z-index:15;width:330px;padding:12px 14px;background:linear-gradient(180deg,rgba(10,8,6,.82),rgba(10,8,6,.92));border:1px solid rgba(233,201,122,.35);border-radius:2px}
  #minimap .mh{font:500 9px/1 var(--mono);letter-spacing:3px;color:#c5ae7a;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between}
  #minimap .mh .prog{color:#8d7b54}
  #minimap svg{width:100%;height:96px;display:block}
  #minimap .ml{font:500 9px/1.2 var(--mono);letter-spacing:2px;color:#8d7b54;margin-top:6px;text-transform:uppercase;display:flex;justify-content:space-between}

  /* ---------- Plaque ---------- */
  #plaque{position:fixed;left:50%;bottom:36px;transform:translateX(-50%) translateY(16px);z-index:18;width:min(820px,94vw);opacity:0;pointer-events:none;transition:opacity .5s ease,transform .6s cubic-bezier(.2,.8,.25,1)}
  #plaque.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #plaque .card{display:grid;grid-template-columns:220px 1fr;gap:22px;padding:20px 24px 22px;background:linear-gradient(180deg,rgba(15,12,8,.96),rgba(8,6,4,.96));border:1px solid var(--accent,#e9c97a);box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04) inset}
  #plaque .bin{display:flex;flex-direction:column;gap:10px}
  #plaque .port{width:100%;height:192px;background:#06080c;display:flex;align-items:center;justify-content:center;border:1px solid rgba(233,201,122,.18)}
  #plaque .port canvas{image-rendering:pixelated;width:144px;height:192px}
  #plaque .shot{width:100%;height:126px;background:#06080c;overflow:hidden;border:1px solid rgba(233,201,122,.22)}
  #plaque .shot canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
  #plaque .tag{font:500 9px/1 var(--mono);letter-spacing:4px;color:#8d7b54;text-transform:uppercase}
  #plaque .meta{font:500 10px/1 var(--mono);letter-spacing:2.5px;color:#a4946a;margin-bottom:4px;text-transform:uppercase}
  #plaque h2{font:400 34px/1 var(--display);letter-spacing:1.2px;color:var(--accent,#e9c97a);margin-bottom:2px}
  #plaque .headline{font:400 italic 14px/1.45 var(--prose);color:#e1d9bf;margin:10px 0 14px;padding-left:10px;border-left:2px solid var(--accent,#e9c97a);max-width:440px}
  #plaque .prose{display:flex;flex-direction:column;gap:8px;min-height:160px}
  #plaque .prose p{font:400 13.5px/1.58 var(--prose);color:#cdc2a4;opacity:0;transform:translateY(8px);transition:opacity .6s ease,transform .8s cubic-bezier(.2,.8,.25,1)}
  #plaque .prose p.on{opacity:1;transform:translateY(0)}
  #plaque .prose p:nth-child(even).on{transform:translateX(0)}
  #plaque .prose p:nth-child(even){transform:translateX(14px)}
  #plaque .cta{margin-top:16px;display:flex;align-items:center;gap:14px}
  #plaque button{pointer-events:auto;font:500 10px/1 var(--mono);letter-spacing:3px;padding:11px 18px;border:1px solid var(--accent,#e9c97a);background:transparent;color:var(--accent,#e9c97a);cursor:pointer;text-transform:uppercase;transition:all .2s}
  #plaque button:hover{background:var(--accent,#e9c97a);color:#0a0706;letter-spacing:4px}
  #plaque .pg-hint{font:500 9px/1 var(--mono);letter-spacing:3px;color:#6a5b3e;text-transform:uppercase}

  /* ---------- Playground ---------- */
  #playground{position:fixed;inset:0;z-index:100;background:rgba(5,6,10,.96);display:none;flex-direction:column}
  #playground.open{display:flex;animation:pgin .4s ease}
  @keyframes pgin{from{opacity:0}to{opacity:1}}
  #playground .pgh{height:46px;background:#0a0806;border-bottom:1px solid var(--accent,#e9c97a);display:flex;align-items:center;padding:0 18px;color:var(--accent,#e9c97a);font:500 11px/1 var(--mono);letter-spacing:3px;text-transform:uppercase}
  #playground .pgh button{margin-left:auto;background:transparent;border:1px solid var(--accent,#e9c97a);color:var(--accent,#e9c97a);padding:8px 16px;font:inherit;cursor:pointer;letter-spacing:3px}
  #playground .pgh button:hover{background:var(--accent,#e9c97a);color:#0a0706}
  #playground iframe{flex:1;border:0;background:#fff;width:100%}

  /* ---------- Coda fade & vignette ---------- */
  #vignette{position:fixed;inset:0;z-index:5;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,.55) 100%)}
  #grain{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:.05;mix-blend-mode:overlay;background-image:radial-gradient(#fff 1px,transparent 1.5px);background-size:3px 3px}
  #whitefade{position:fixed;inset:0;z-index:7;pointer-events:none;background:#fff;opacity:0;transition:opacity .6s}

  /* ---------- Scroll hair ---------- */
  #scrollbar{position:fixed;top:0;left:0;right:0;height:2px;z-index:19;pointer-events:none}
  #scrollbar .f{height:100%;background:linear-gradient(90deg,var(--accent,#e9c97a),transparent);width:0%;transition:width .08s linear}

  /* ---------- Reduced motion ---------- */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important;transition-duration:.15s !important}
  }
</style>
</head>

/* ---------- Pixel portraits (hand-authored 24×32) ---------- */
/* Use string pixel grids — 0=clear, 1=silhouette, 2=highlight, 3=accent, 4=bg-halo */
const PORT = {};
function paintPortrait(key, palette){
  const c = document.createElement("canvas"); c.width=72; c.height=96;
  const g = c.getContext("2d");
  // halo
  const grd = g.createRadialGradient(36,44,6,36,44,56);
  grd.addColorStop(0, rgb(hex(palette[3]),0.4));
  grd.addColorStop(1, rgb(hex(palette[0]),0));
  g.fillStyle = rgb(hex(palette[0])); g.fillRect(0,0,72,96);
  g.fillStyle = grd; g.fillRect(0,0,72,96);
  const sil = PORT_PX[key] || PORT_PX.trumpet;
  const pxW=24, pxH=32, cell=3;
  const ox=(72-pxW*cell)/2, oy=(96-pxH*cell)/2;
  for(let y=0;y<pxH;y++){
    for(let x=0;x<pxW;x++){
      const v = sil[y][x];
      if(v===0) continue;
      let col;
      if(v===1) col = hex(palette[0]);
      else if(v===2) col = hex(palette[3]);
      else if(v===3) col = hex(palette[4]);
      else if(v===4) col = mix(hex(palette[2]), hex(palette[4]), 0.5);
      else col = hex(palette[2]);
      g.fillStyle = rgb(col);
      g.fillRect(ox+x*cell, oy+y*cell, cell, cell);
    }
  }
  // CRT scanlines
  g.globalAlpha = 0.18;
  for(let y=0;y<96;y+=2){ g.fillStyle="#000"; g.fillRect(0,y,72,1); }
  g.globalAlpha = 1;
  return c;
}

/* ---------- Audio engine ---------- */
let AC = null, master = null, reverb=null, convGain=null, dryGain=null;
let audioReady = false;
let activeOsc = [];
let schedulerTimer = null;
let curMovement = -1;
let motifNextTime = 0;
function makeImpulse(len, decay){
  const rate = AC.sampleRate;
  const length = rate * len;
  const imp = AC.createBuffer(2, length, rate);
  for(let ch=0;ch<2;ch++){
    const d = imp.getChannelData(ch);
    for(let i=0;i<length;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/length, decay);
  }
  return imp;
}
function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext||window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0.0; master.connect(AC.destination);
  const comp = AC.createDynamicsCompressor(); comp.threshold.value=-18; comp.ratio.value=4; comp.attack.value=.01; comp.release.value=.25;
  comp.connect(master);
  reverb = AC.createConvolver(); reverb.buffer = makeImpulse(2.8, 2.0);
  convGain = AC.createGain(); convGain.gain.value = 0.45;
  dryGain = AC.createGain(); dryGain.gain.value = 0.9;
  reverb.connect(convGain); convGain.connect(comp); dryGain.connect(comp);
  audioReady = true;
}
function mtof(m){ return 440 * Math.pow(2,(m-69)/12); }
function fadeIn(){
  if(!AC) return;
  master.gain.cancelScheduledValues(AC.currentTime);
  master.gain.setValueAtTime(master.gain.value, AC.currentTime);
  master.gain.linearRampToValueAtTime(0.32, AC.currentTime + 1.8);
}
function playVoice(freq, start, dur, type, gain){
  const o = AC.createOscillator(); o.type = type || "triangle"; o.frequency.value = freq;
  const g = AC.createGain();
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(gain||0.08, start + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  o.connect(g); g.connect(dryGain); g.connect(reverb);
  o.start(start); o.stop(start + dur + 0.05);
  activeOsc.push(o);
  if(activeOsc.length>120){ const old = activeOsc.shift(); try{old.stop();}catch{} }
}
function playHat(start, dur, gain){
  const noiseBuf = AC.createBuffer(1, AC.sampleRate*0.1, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 3);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const hp = AC.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=6000;
  const g = AC.createGain(); g.gain.value = gain||0.04;
  src.connect(hp); hp.connect(g); g.connect(dryGain);
  src.start(start); src.stop(start + dur);
}

/* Schedule motif for current movement — voice lead across boundaries */
let motifState = { idx:-1, beat:0, lastChord:null };
function scheduleMotif(now, mIdx, intensity){
  if(!AC) return;
  const m = M[mIdx]; if(!m) return;
  const spb = 60 / m.motif.bpm;
  while(motifNextTime < now + 0.6){
    if(motifNextTime < now) motifNextTime = now + 0.05;
    const t = motifNextTime;
    const chordIdx = motifState.beat % m.motif.chords.length;
    const chord = m.motif.chords[chordIdx];
    const bass = m.motif.bass[chordIdx % m.motif.bass.length];
    const mel = m.motif.mel[motifState.beat % m.motif.mel.length];
    const vol = intensity;
    // bass on the 1
    playVoice(mtof(bass), t, spb*1.6, "sine", 0.10*vol);
    // chord pad voices (triangle)
    for(let i=0;i<chord.length;i++) playVoice(mtof(chord[i]), t+0.02, spb*1.8, "triangle", 0.035*vol);
    // melody on off-beats (sine)
    playVoice(mtof(mel+12), t + spb*0.5, spb*0.9, "sine", 0.08*vol);
    // soft hat on the &
    playHat(t + spb*0.5, 0.1, 0.022*vol);
    if(motifState.beat%2===1) playHat(t + spb*0.75, 0.08, 0.015*vol);
    motifNextTime += spb;
    motifState.beat++;
    motifState.lastChord = chord;
  }
}

/* ---------- Scene paint helpers ---------- */
function fillBackdrop(g, palette, beat){
  // gradient stops derived from palette + beat
  const top = hex(palette[0]);
  const mid = hex(palette[1]);
  const bot = hex(palette[0]);
  const grd = g.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, rgb(top));
  grd.addColorStop(0.5, rgb(mid));
  grd.addColorStop(1, rgb(bot));
  g.fillStyle = grd; g.fillRect(0,0,W,H);
}
function drawDust(g, palette, sub, time){
  g.save();
  for(const p of dust){
    const y = (p.y + time*0.00004*p.z + sub*0.2) % 1;
    const x = (p.x + Math.sin(time*0.0003+p.z*7)*0.02) % 1;
    const sz = p.s * (0.5 + 0.5*p.z);
    g.fillStyle = rgb(hex(palette[3]), p.o*0.35);
    g.beginPath(); g.arc(x*W, y*H, sz, 0, TAU); g.fill();
  }
  g.restore();
}
function vignette(g, strength){
  const grd = g.createRadialGradient(W/2, H*0.5, Math.min(W,H)*0.2, W/2, H*0.5, Math.max(W,H)*0.7);
  grd.addColorStop(0, "rgba(0,0,0,0)");
  grd.addColorStop(1, `rgba(0,0,0,${strength})`);
  g.fillStyle = grd; g.fillRect(0,0,W,H);
}
function rimLight(g, palette, sub, beat){
  const c = hex(palette[3]);
  const a = beat.name==="arrival" ? (0.22 + smooth(beat.frac)*0.35) : (beat.name==="sustained" ? 0.25 : 0.12);
  const grd = g.createRadialGradient(W/2, H*0.45, 40, W/2, H*0.45, Math.max(W,H)*0.9);
  grd.addColorStop(0, rgb(c, a));
  grd.addColorStop(1, rgb(c, 0));
  g.fillStyle = grd; g.fillRect(0,0,W,H);
}
function godrays(g, palette, strength){
  if(strength<=0.01) return;
  g.save(); g.globalCompositeOperation = "screen";
  const cx = W*0.5, cy = H*0.15;
  const c = hex(palette[4]);
  for(let i=0;i<16;i++){
    const ang = -Math.PI/2 + (i-8)*0.08;
    g.beginPath(); g.moveTo(cx,cy);
    const dx = Math.cos(ang)*W, dy = Math.sin(ang)*H*2;
    g.lineTo(cx+dx+30, cy+dy); g.lineTo(cx+dx-30, cy+dy); g.closePath();
    g.fillStyle = rgb(c, 0.02*strength);
    g.fill();
  }
  g.restore();
}

/* ---------- Per-movement renderers ----------
   Each takes (g, sub, beat, time, m).
   sub ∈ [0,1] is position within movement.
   beat = {name, frac} indicates which of 5 beats + local frac [0,1].
*/
const RENDER = {};

/* 1.0 Miles — The Bunker: first-person corridor. Doorway narrows; candle flare on arrival; diorama on sustained. */
RENDER["1.0"] = function(g, sub, beat, time, m){
  const p = m.palette;
  fillBackdrop(g, p, beat);
  // fog + floor
  const floorY = H*0.68;
  // ceiling
  g.fillStyle = rgb(hex(p[0])); g.fillRect(0,0,W,floorY);
  // floor
  const fgrd = g.createLinearGradient(0,floorY,0,H);
  fgrd.addColorStop(0, rgb(hex(p[0]),1));
  fgrd.addColorStop(1, rgb(hex(p[1]),1));
  g.fillStyle = fgrd; g.fillRect(0,floorY,W,H-floorY);
  // receding corridor frames (one-point perspective)
  const depth = 14;
  for(let i=depth;i>=0;i--){
    const s = 1 - i/depth; // 0 far, 1 near
    const w = lerp(W*0.12, W*1.4, s);
    const h = lerp(H*0.22, H*1.2, s);
    const x = W/2 - w/2;
    const y = H*0.48 - h*0.4;
    const intensity = s;
    g.strokeStyle = rgb(mix(hex(p[0]),hex(p[2]), intensity*0.7), 0.6 - i*0.04);
    g.lineWidth = 1.5 + s*2;
    g.strokeRect(x, y, w, h);
    if(i===Math.floor(depth*0.5)){
      g.fillStyle = rgb(hex(p[2]), 0.1); g.fillRect(x,y,w,h);
    }
  }
  // distant door (the "approach" beat shows a small candle; it grows during anticipation)
  const reveal = beat.name==="approach" ? beat.frac*0.3 : (beat.name==="anticipation" ? 0.3 + beat.frac*0.5 : (beat.name==="arrival" ? 0.8 + beat.frac*0.2 : 1.0));
  // candle flame at far point
  const cx = W/2, cy = H*0.4;
  const flick = 0.9 + Math.sin(time*0.012)*0.1 + Math.sin(time*0.03)*0.04;
  const flameR = 8 + reveal*30;
  const fgrd2 = g.createRadialGradient(cx,cy,1,cx,cy,flameR*4);
  fgrd2.addColorStop(0, rgb([255,230,180], 0.95*flick*reveal));
  fgrd2.addColorStop(0.3, rgb(hex(p[2]), 0.6*flick*reveal));
  fgrd2.addColorStop(1, rgb(hex(p[0]), 0));
  g.fillStyle = fgrd2; g.fillRect(0,0,W,H);
  // fact token 1 — permalink slugs drifting in
  g.save();
  const fts = [" /?p=123 ", " /archive.php?cat=5 ", " /2004/01/hello-world/ ", " /%postname%/ "];
  for(let i=0;i<fts.length;i++){
    const phase = (time*0.00006 + i*0.25) % 1;
    const x = W*0.1 + phase*W*0.8;
    const y = H*0.75 + Math.sin(phase*TAU+i)*20;
    const op = Math.sin(phase*Math.PI) * (beat.name==="sustained" ? 0.5 : 0.2);
    g.font = "500 12px IBM Plex Mono,Menlo,monospace";
    g.fillStyle = rgb(hex(p[3]), op);
    g.fillText(fts[i], x, y);
  }
  g.restore();
  // fact token 2 — hook bubbles puffing out during sustained
  if(beat.name==="sustained" || beat.name==="arrival"){
    g.save();
    const hooks = ["add_filter()","add_action()","do_action()","apply_filters()"];
    for(let i=0;i<hooks.length;i++){
      const phase = ((time*0.0002 + i*0.25) % 1);
      const a = 1-phase;
      const x = W*0.15 + i*W*0.18 + Math.sin(time*0.002+i)*20;

      g.fillStyle = rgb(hex(p[4]), 0.6*a);

  }
  // wall carving "1.0 · MILES" during anticipation

/* 2.0 Duke — Crypt Library: cinematic side-scroll alcoves */
RENDER["2.0"] = function(g, sub, beat, time, m){
  const p = m.palette;
  fillBackdrop(g, p, beat);
  // side-scroll pan driven by sub
  const pan = sub * W * 2.5;
  // Backwall texture
  g.fillStyle = rgb(hex(p[1])); g.fillRect(0,0,W,H);
  // columns receding
  for(let i=0;i<12;i++){
    const x = i*W*0.25 - pan*0.5;
    const xm = ((x % (W*1.2))+W*1.2)%(W*1.2) - W*0.1;
    g.fillStyle = rgb(hex(p[1]), 0.8);
    g.fillRect(xm, H*0.1, 4, H*0.8);
    g.fillStyle = rgb(hex(p[2]), 0.5);
    g.fillRect(xm-10, H*0.08, 24, 10);
    g.fillRect(xm-10, H*0.9, 24, 10);
  }
  // alcoves holding scrolls / busts
  const alcoveCount = 7;
  for(let i=0;i<alcoveCount;i++){
    const ax = (i*W*0.38 - pan*1.0);
    const axm = ((ax%(W*3))+W*3)%(W*3) - W;
    if(axm<-200||axm>W+200) continue;
    const ay = H*0.3;
    const aw = 140, ah = H*0.42;
    g.fillStyle = rgb(hex(p[0]));
    g.fillRect(axm, ay, aw, ah);
    // arch
    g.fillStyle = rgb(hex(p[1]));
    g.beginPath(); g.arc(axm+aw/2, ay, aw/2, 0, Math.PI, true); g.fill();
    // scroll contents: TinyMCE toolbar icons float in alcove
    const icons = ["B","I","U","¶","“”","⌖","🔗","—"];
    for(let k=0;k<icons.length;k++){
      const ix = axm+10+k*16, iy = ay+30+Math.sin(time*0.003+k+i)*4;
      g.fillStyle = rgb(hex(p[4]), 0.7);
      g.font="700 12px IBM Plex Mono,Menlo,monospace";
      g.fillText(icons[k], ix, iy);
    }
    // user-role crowns below
    const roles = ["A","E","Au","C","S"];
    for(let k=0;k<roles.length;k++){
      const rx = axm+12+k*22, ry = ay+ah-20;
      const lit = (i*roles.length + k) % 5 === Math.floor(time*0.002)%5;
      g.fillStyle = rgb(hex(p[lit?4:2]), lit?0.9:0.5);
      g.font="700 10px IBM Plex Mono,Menlo,monospace";
      g.fillText("♔"+roles[k], rx, ry);
    }
  }
  // candle flames on columns
  for(let i=0;i<24;i++){
    const x = (i*100 - pan*0.8) % (W+200) - 40;
    const fy = H*0.5 + Math.sin(time*0.004+i)*2;
    const grd = g.createRadialGradient(x,fy,1,x,fy,40);
    grd.addColorStop(0, rgb([255,220,140], 0.6));
    grd.addColorStop(1, rgb(hex(p[0]), 0));
    g.fillStyle = grd; g.fillRect(x-40,fy-40,80,80);
  }
  // Arrival: curtain pull — giant "2.0 · DUKE" descends
  if(beat.name==="arrival"){
    const k = ease(beat.frac);
    g.save();
    g.fillStyle = rgb(hex(p[4]), 0.92*k);
    g.font = "700 64px Didot, Georgia, serif"; g.textAlign="center";
    g.fillText("2.0 · DUKE", W/2, H*0.25 + (1-k)*40);
    g.restore();
  }
  rimLight(g,p,sub,beat);
  drawDust(g,p,sub,time);
  vignette(g, 0.42);
};

/* 3.0 Thelonious — Laboratory: orbit around a planet, moon merging */
RENDER["3.0"] = function(g, sub, beat, time, m){
  const p = m.palette;
  // deep cool gradient
  const grd = g.createRadialGradient(W*0.5, H*0.55, 20, W*0.5, H*0.55, Math.max(W,H)*0.9);
  grd.addColorStop(0, rgb(hex(p[1])));
  grd.addColorStop(1, rgb(hex(p[0])));
  g.fillStyle = grd; g.fillRect(0,0,W,H);
  // starfield
  for(let i=0;i<120;i++){
    const sx = (i*137 + Math.floor(time*0.05))%W;
    const sy = (i*91)%H;
    const a = 0.3 + 0.5*Math.sin(time*0.003+i);
    g.fillStyle = rgb(hex(p[4]), a*0.4);
    g.fillRect(sx|0, sy|0, 1, 1);
  }
  // orbit angle driven by sub
  const orbit = time*0.0004 + sub*TAU*0.5;
  const cx = W*0.5, cy = H*0.55;
  const planetR = Math.min(W,H)*0.18;
  // rings
  g.save(); g.translate(cx,cy); g.rotate(orbit*0.3);
  for(let i=0;i<3;i++){
    const rr = planetR*1.4 + i*10;
    g.strokeStyle = rgb(hex(p[3]), 0.15);
    g.beginPath(); g.ellipse(0,0, rr, rr*0.28, 0, 0, TAU); g.stroke();
  }
  g.restore();
  // planet
  const pgrd = g.createRadialGradient(cx-planetR*0.3, cy-planetR*0.3, planetR*0.1, cx, cy, planetR);
  pgrd.addColorStop(0, rgb(hex(p[3])));
  pgrd.addColorStop(0.7, rgb(hex(p[2])));
  pgrd.addColorStop(1, rgb(hex(p[1])));
  g.fillStyle = pgrd; g.beginPath(); g.arc(cx,cy,planetR,0,TAU); g.fill();
  // continents (custom post types glyphs)
  g.save(); g.beginPath(); g.arc(cx,cy,planetR,0,TAU); g.clip();
  g.fillStyle = rgb(hex(p[1]), 0.55);
  for(let i=0;i<5;i++){
    g.beginPath();
    const a = orbit + i*1.2;
    const rx = cx + Math.cos(a)*planetR*0.5;
    const ry = cy + Math.sin(a)*planetR*0.4;
    g.arc(rx, ry, planetR*0.22, 0, TAU); g.fill();
  }
  g.restore();
  // moon — fact token #1: WP-MU merging in
  const mergeT = beat.name==="approach"? beat.frac*0.3 : (beat.name==="anticipation"? 0.3 + beat.frac*0.5 : (beat.name==="arrival"? 0.8 + beat.frac*0.2 : 1.0));
  const moonR = planetR*0.35;
  const angleIn = -Math.PI*0.7;
  const startDist = planetR*3.5, endDist = planetR + moonR*0.2;
  const dist = lerp(startDist, endDist, ease(mergeT));
  const mx = cx + Math.cos(angleIn)*dist;
  const my = cy + Math.sin(angleIn)*dist;
  const mgrd = g.createRadialGradient(mx-moonR*0.3, my-moonR*0.3, moonR*0.1, mx, my, moonR);
  mgrd.addColorStop(0, rgb(hex(p[4])));
  mgrd.addColorStop(1, rgb(hex(p[2])));
  g.fillStyle = mgrd; g.beginPath(); g.arc(mx, my, moonR, 0, TAU); g.fill();
  g.fillStyle = rgb(hex(p[0]));
  g.font = "700 10px IBM Plex Mono,monospace"; g.textAlign="center";
  g.fillText("MU", mx, my+4);
  g.textAlign="left";
  // merge glow on arrival
  if(beat.name==="arrival"){
    const k = smooth(beat.frac);
    const ggrd = g.createRadialGradient(cx,cy,planetR*0.5, cx,cy, planetR*3);
    ggrd.addColorStop(0, rgb(hex(p[4]), 0.4*k));
    ggrd.addColorStop(1, rgb(hex(p[4]), 0));
    g.fillStyle = ggrd; g.fillRect(0,0,W,H);
  }
  // fact token #2: Twenty Ten theme thumbnail floats in on sustained
  if(beat.name==="sustained" || beat.name==="arrival"){
    const ox = W*0.8, oy = H*0.65;
    const thumb = 120;
    g.save(); g.translate(ox, oy); g.rotate(Math.sin(time*0.001)*0.04);
    g.fillStyle = rgb(hex(p[4]));
    g.fillRect(-thumb/2, -thumb/2, thumb, thumb);
    g.fillStyle = rgb(hex(p[1]));
    g.fillRect(-thumb/2+8, -thumb/2+8, thumb-16, 16);
    for(let i=0;i<4;i++){ g.fillStyle = rgb(hex(p[2]), 0.7); g.fillRect(-thumb/2+8, -thumb/2+30+i*12, thumb-16, 8); }
    g.fillStyle = rgb(hex(p[0])); g.font = "700 10px IBM Plex Mono,monospace"; g.textAlign="center";
    g.fillText("Twenty Ten", 0, -thumb/2+20);
    g.restore();
    g.textAlign="left";
  }
  // release label
  if(beat.name==="arrival"){
    const k = ease(beat.frac);
    g.save(); g.globalAlpha = k;
    g.font = "400 56px Didot, Georgia, serif"; g.textAlign="center";
    g.fillStyle = rgb(hex(p[4]));
    g.fillText("3.0 · THELONIOUS", W/2, H*0.2);
    g.restore();
  }
  rimLight(g,p,sub,beat);
  drawDust(g,p,sub,time);
  vignette(g, 0.4);
};

/* 3.3 Sonny — Velvet Pointer: Dutch tilt, drag-drop rain, pointer bubbles */
RENDER["3.3"] = function(g, sub, beat, time, m){
  const p = m.palette;
  g.save();
  // slight Dutch tilt
  const tilt = 0.05 * Math.sin(time*0.0008);
  g.translate(W/2, H/2); g.rotate(tilt); g.translate(-W/2, -H/2);
  // velvet backdrop
  const grd = g.createRadialGradient(W*0.5, H*0.5, 40, W*0.5, H*0.5, Math.max(W,H));
  grd.addColorStop(0, rgb(hex(p[2])));
  grd.addColorStop(1, rgb(hex(p[0])));
  g.fillStyle = grd; g.fillRect(-W*0.2, -H*0.2, W*1.4, H*1.4);
  // velvet texture (vertical drapes)
  for(let i=0;i<36;i++){
    const x = (i/36)*W*1.4 - W*0.2;
    g.fillStyle = rgb(hex(p[1]), 0.06 + 0.05*Math.sin(i*0.7));
    g.fillRect(x, -H*0.2, 6, H*1.4);
  }
  // portal ring
  const cx = W*0.5, cy = H*0.5;
  const ringR = Math.min(W,H)*0.3 * (0.9 + Math.sin(time*0.002)*0.04);
  for(let i=6;i>=0;i--){
    g.strokeStyle = rgb(hex(p[3]), 0.3 - i*0.04);
    g.lineWidth = 1+i*1.2;
    g.beginPath(); g.arc(cx,cy, ringR+i*6, 0, TAU); g.stroke();
  }
  // drag-drop rain — pixel files falling UP (upload)
  for(let i=0;i<40;i++){
    const phase = ((time*0.0003 + i*0.27) % 1);
    const x = W*0.15 + ((i*57)%80)*(W*0.7/80);
    const y = lerp(H*1.1, -40, phase);
    const op = Math.sin(phase*Math.PI);
    g.fillStyle = rgb(hex(p[4]), op*0.7);
    g.fillRect(x, y, 10, 12);
    g.fillStyle = rgb(hex(p[2]), op*0.9);
    g.fillRect(x+6, y, 4, 4);
    g.fillStyle = rgb(hex(p[0]), op);
    g.font = "500 6px IBM Plex Mono,monospace"; g.fillText(".jpg", x+1, y+20);
  }
  g.restore();
  // pointer bubbles (outside tilt so they read)
  if(beat.name!=="approach"){
    const bubbles = [
      {x:W*0.2, y:H*0.3, txt:"Try the new admin bar!"},
      {x:W*0.72, y:H*0.68, txt:"Drag files here."},
      {x:W*0.16, y:H*0.72, txt:"Flyout menus, anywhere."}
    ];
    for(let i=0;i<bubbles.length;i++){
      const show = clamp(sub*1.5 - i*0.18, 0, 1);
      if(show<=0) continue;
      const b = bubbles[i];
      g.save(); g.globalAlpha = smooth(show);
      g.fillStyle = rgb(hex(p[3]));
      g.beginPath();
      const bw=180, bh=34;
      g.moveTo(b.x,b.y); g.lineTo(b.x+bw,b.y); g.lineTo(b.x+bw,b.y+bh); g.lineTo(b.x+20,b.y+bh);
      g.lineTo(b.x+12,b.y+bh+8); g.lineTo(b.x+8,b.y+bh); g.lineTo(b.x,b.y+bh); g.closePath();
      g.fill();
      g.fillStyle = rgb(hex(p[0]));
      g.font="600 12px Inter,sans-serif";
      g.fillText(b.txt, b.x+12, b.y+22);
      g.restore();
    }
  }
  if(beat.name==="arrival"){
    const k = ease(beat.frac);
    g.save(); g.globalAlpha=k;
    g.font = "400 52px Didot, Georgia, serif"; g.textAlign="center";
    g.fillStyle = rgb(hex(p[4]));
    g.fillText("3.3 · SONNY", W/2, H*0.15);

};

/* 4.0 Benny — Marble Atrium: dolly-zoom media grid wall */
RENDER["4.0"] = function(g, sub, beat, time, m){
  const p = m.palette;
  // marble floor + sky
  const sky = g.createLinearGradient(0,0,0,H*0.55);
  sky.addColorStop(0, rgb(hex(p[1])));
  sky.addColorStop(1, rgb(hex(p[0])));
  g.fillStyle = sky; g.fillRect(0,0,W,H*0.55);
  const floor = g.createLinearGradient(0,H*0.55,0,H);
  floor.addColorStop(0, rgb(hex(p[2])));
  floor.addColorStop(1, rgb(hex(p[3])));
  g.fillStyle = floor; g.fillRect(0,H*0.55,W,H*0.45);
  // marble veins on floor
  for(let i=0;i<30;i++){
    g.strokeStyle = rgb(hex(p[3]), 0.12);
    g.lineWidth = 1;
    g.beginPath();
    const y0 = H*0.55 + (i*12)%(H*0.45);
    g.moveTo(0, y0);
    for(let x=0;x<=W;x+=20){ g.lineTo(x, y0 + Math.sin(x*0.02+i)*4); }
    g.stroke();
  }
  // dolly-zoom: grid recedes as sub increases (pull-back)
  const zoom = lerp(1.8, 0.6, ease(sub));
  const gridCols = 7, gridRows = 4;
  const cellW = (W*0.65/gridCols)*zoom, cellH = (H*0.4/gridRows)*zoom;

  const oy = H*0.18;
  for(let r=0;r<gridRows;r++){
    for(let c=0;c<gridCols;c++){
      const reflow = (sub*2 + c*0.07 + r*0.12)%1;
      const x = ox + c*cellW + Math.sin(time*0.001+c+r)*reflow*6;
      const y = oy + r*cellH;
      const hue = (c*17 + r*41)%360;
      g.fillStyle = `hsl(${hue},${30+((c+r)%3)*10}%,${55-r*4}%)`;
      g.fillRect(x,y,cellW-4,cellH-4);
      g.fillStyle = "rgba(255,255,255,0.12)"; g.fillRect(x,y,cellW-4,4);
    }
  }
  // globe of language packs (fact token #2)
  const gx = W*0.85, gy = H*0.75, gR = 40;

  g.strokeStyle = rgb(hex(p[4]), 0.6); g.lineWidth=1;
  g.beginPath(); g.arc(0,0,gR,0,TAU); g.stroke();
  for(let i=0;i<6;i++){
    g.beginPath();
    g.ellipse(0,0, gR, gR*Math.abs(Math.cos(i/6*Math.PI+time*0.0005)), 0, 0, TAU); g.stroke();
  }
  const flags = ["en","es","fr","de","ja","zh","pt","ru"];
  for(let i=0;i<flags.length;i++){
    const a = time*0.001 + i/flags.length*TAU;
    const x = Math.cos(a)*gR*1.2, y = Math.sin(a)*gR*0.4;
    g.fillStyle = rgb(hex(p[4]));
    g.font="700 9px IBM Plex Mono,monospace"; g.fillText(flags[i], x-6, y+3);
  }
  g.restore();
  // inline oEmbed card drifting
  if(beat.name==="sustained" || beat.name==="arrival"){
    const ocx = W*0.14, ocy = H*0.7 + Math.sin(time*0.0015)*10;
    g.fillStyle = rgb(hex(p[4]));
    g.fillRect(ocx, ocy, 160, 80);
    g.strokeStyle = rgb(hex(p[3])); g.strokeRect(ocx, ocy, 160, 80);
    g.fillStyle = rgb(hex(p[2])); g.fillRect(ocx+8, ocy+8, 60, 44);
    g.fillStyle = rgb(hex(p[4]));
    g.beginPath(); g.moveTo(ocx+26, ocy+22); g.lineTo(ocx+50, ocy+30); g.lineTo(ocx+26, ocy+38); g.closePath(); g.fill();
    g.fillStyle = rgb(hex(p[4])); g.font="600 9px Inter,sans-serif";
    g.fillText("inline embed preview", ocx+72, ocy+22);
  }
  // arrival label
  if(beat.name==="arrival"){
    const k = ease(beat.frac);
    g.save(); g.globalAlpha=k;
    g.font = "400 62px Didot, Georgia, serif"; g.textAlign="center";
    g.fillStyle = rgb(hex(p[4]));
    g.fillText("4.0 · BENNY", W/2, H*0.14);
    g.restore();

  rimLight(g,p,sub,beat);
  drawDust(g,p,sub,time);
  vignette(g, 0.22);
};

/* 5.0 Bebo — Gallery: macro pull from a single block to a post */
RENDER["5.0"] = function(g, sub, beat, time, m){

/* 6.0 Arturo — Neon Site-Editor */
RENDER["6.0"] = function(g, sub, beat, time, m){

    g.fillStyle = rgb(hex(p[3]), 0.04);

  }
  const sun = g.createLinearGradient(sx, sy-sR, sx, sy);
  sun.addColorStop(0, rgb(hex(p[3])));
  sun.addColorStop(1, rgb(hex(p[2])));
  g.fillStyle = sun; g.beginPath(); g.arc(sx,sy,sR,0,TAU); g.fill();
  // scanlines across sun
  g.fillStyle = rgb(hex(p[0]), 0.8);

  // Dutch tilt for the site-editor overlay
  g.save();
  const tilt = 0.06;
  g.translate(W/2, H/2); g.rotate(tilt); g.translate(-W/2, -H/2);

  for(let i=0;i<regions.length;i++){

/* Coda */
function renderCoda(g, t, time){
  const p = M[M.length-1].palette;
  const grd = g.createRadialGradient(W/2,H/2,10,W/2,H/2,Math.max(W,H));
  grd.addColorStop(0, rgb(hex(p[0])));
  grd.addColorStop(1, rgb(mix(hex(p[0]), [255,255,255], t)));
  g.fillStyle = grd; g.fillRect(0,0,W,H);
  g.save();
  g.globalAlpha = 1-t*0.4;
  g.fillStyle = "#3a4254";
  g.textAlign="center";
  g.font = "400 italic 17px 'Iowan Old Style',Georgia,serif";
  g.fillText("the suite continues, elsewhere.", W/2, H*0.46);
  g.font = "500 10px IBM Plex Mono,monospace";
  g.fillStyle = "#7a8299";
  g.fillText("— end —", W/2, H*0.52);
  g.restore();

  document.getElementById("whitefade").style.opacity = String(t*0.5);
}

/* ---------- Scene dispatch ---------- */
function getBeat(sub){
  for(let i=0;i<BEATS.length;i++){
    const b = BEATS[i];
    if(sub >= b.a && sub <= b.b){
      const frac = (sub - b.a) / (b.b - b.a);
      return {name:b.key, frac, i};
    }
  }
  return {name:"departure", frac:1, i:4};
}
function scrollToMovement(y){
  if(y < OVERTURE) return {m:-1, sub:y/OVERTURE};
  if(y > OVERTURE + M.length*MLEN) return {m:M.length, sub:(y-OVERTURE-M.length*MLEN)/CODA};
  const idx = Math.floor((y - OVERTURE)/MLEN);
  const sub = ((y - OVERTURE) - idx*MLEN)/MLEN;
  return {m:idx, sub};
}

/* ---------- UI updates ---------- */
function setAccent(color){
  document.documentElement.style.setProperty("--accent", color);
}
function updateHUD(curM, sub, beat){
  const rel = document.getElementById("h-release");
  const mvt = document.getElementById("h-movement");
  const eraE = document.getElementById("h-era");
  if(curM<0){
    rel.textContent = "OVERTURE"; mvt.textContent = "Nine Movements"; eraE.textContent = "WORDPRESS · 2003 → 2026";
  } else if(curM>=M.length){
    rel.textContent = "CODA"; mvt.textContent = "— end —"; eraE.textContent = "after the ninth movement";
  } else {
    const m = M[curM];
    rel.textContent = `WORDPRESS ${m.v} · ${m.musician}`;
    mvt.textContent = m.era;
    eraE.textContent = `${m.date} · ${m.register}`;
    setAccent(m.palette[3]);
  }
  const bnodes = document.querySelectorAll("#beats .b");
  bnodes.forEach((el,i)=>{
    el.classList.remove("on","past");
    if(curM<0||curM>=M.length) return;
    if(i===beat.i) el.classList.add("on");
    else if(i<beat.i) el.classList.add("past");
  });
}
function updateMinimap(y, curM, sub){
  const pct = clamp(y/TOTAL, 0, 1);
  document.getElementById("m-prog").textContent = String(Math.floor(pct*100)).padStart(2,"0")+"%";
  const svg = document.getElementById("m-svg");
  const sx = (i)=> 18 + (320-36)*(i/(M.length-1));
  const pulse = document.getElementById("mpulse");
  if(pulse){
    let x;
    if(curM<0) x = sx(0);
    else if(curM>=M.length) x = sx(M.length-1);
    else x = lerp(sx(curM), sx(Math.min(M.length-1, curM+1)), sub);
    pulse.setAttribute("cx", x);
    const r = 6 + 2*Math.sin(Date.now()*0.005);
    pulse.setAttribute("r", r);
  }
  // highlight current node
  for(let i=0;i<M.length;i++){
    const n = document.getElementById("mnode"+i);
    if(!n) continue;
    if(i===curM){ n.setAttribute("fill", M[i].palette[3]); n.setAttribute("r","5"); }
    else if(i<curM){ n.setAttribute("fill", M[i].palette[3]+"aa" /*not valid but browsers ignore*/); n.setAttribute("fill-opacity","0.8"); n.setAttribute("r","4"); }
    else { n.setAttribute("fill", "#0a0806"); n.setAttribute("r","4"); n.setAttribute("fill-opacity","1");}
  }
  const fromE = document.getElementById("m-from"); const toE = document.getElementById("m-to");
  if(curM<0){ fromE.textContent="overture"; toE.textContent=M[0].era; }
  else if(curM>=M.length){ fromE.textContent=M[M.length-1].era; toE.textContent="coda"; }
  else {
    fromE.textContent = M[curM].era;
    toE.textContent = curM+1<M.length ? M[curM+1].era : "coda";
  }
}

/* ---------- Plaque ---------- */
let plaqueState = { curM:-1 };
function updatePlaque(curM, sub, beat){
  const plaque = document.getElementById("plaque");
  const shouldShow = curM>=0 && curM<M.length && (beat.name==="arrival" || beat.name==="sustained" || (beat.name==="departure" && beat.frac<0.4));
  if(shouldShow){
    if(plaqueState.curM !== curM){
      plaqueState.curM = curM;
      const m = M[curM];
      document.getElementById("p-meta").textContent = `WORDPRESS ${m.v} · ${m.date} · ${m.musician}`;
      document.getElementById("p-name").textContent = `${m.era} — "${m.name}"`;
      document.getElementById("p-headline").textContent = m.headline;
      document.getElementById("p-tag").textContent = `${m.adminKey.toUpperCase()} · ERA MOCK`;
      // portrait
      const portCanvas = document.getElementById("p-port");
      const pg = portCanvas.getContext("2d"); pg.clearRect(0,0,72,96);
      if(PORT[m.portraitKey]) pg.drawImage(PORT[m.portraitKey], 0, 0);
      // shot
      const shotCanvas = document.getElementById("p-shot");
      const sg = shotCanvas.getContext("2d"); sg.clearRect(0,0,280,140);
      if(SHOT[m.adminKey]) sg.drawImage(SHOT[m.adminKey], 0, 0);
      // prose
      const proseEl = document.getElementById("p-prose");
      proseEl.innerHTML = m.paras.map((t,i)=>`<p data-i="${i}">${t}</p>`).join("");
      // CTA
      const btn = document.getElementById("p-btn");
      btn.dataset.v = m.v;
    }
    plaque.classList.add("show");
    plaque.style.setProperty("--accent", M[curM].palette[3]);
    // Layered reveal: reveal paragraphs based on beat+sub
    const reveal = beat.name==="arrival" ? beat.frac : (beat.name==="sustained" ? 0.2 + beat.frac*0.95 : 1);
    const paras = document.querySelectorAll("#p-prose p");
    paras.forEach((el,i)=>{
      const threshold = i * (1/paras.length) * 0.95 + 0.02;
      el.classList.toggle("on", reveal > threshold);
    });
  } else {
    plaque.classList.remove("show");
    if(!shouldShow) plaqueState.curM = -1;
  }
}

/* ---------- Scrollbar hairline ---------- */
function updateScrollbar(){
  const pct = clamp(scrollSmooth/TOTAL, 0, 1);
  document.getElementById("sf").style.width = (pct*100)+"%";
}

/* ---------- Main loop ---------- */
let rafId = 0;
let lastT = 0;
let started = false;
let fpsAcc = 0, fpsN = 0, fps = 60;
function frame(t){
  const dt = Math.min(50, t-lastT); lastT = t;
  fpsAcc += 1000/(Math.max(1,dt)); fpsN++;
  if(fpsN>30){ fps = fpsAcc/fpsN; fpsAcc=0; fpsN=0; }

  scrollSmooth += (scrollTarget - scrollSmooth) * 0.12;
  const y = scrollSmooth;
  const st = scrollToMovement(y);

  ctx.save();
  // camera breathing
  const breath = Math.sin(t*0.0008)*2;
  ctx.translate(0, breath);

  ctx.fillStyle = "#05060a"; ctx.fillRect(0,0,W,H);

  let beat = {name:"approach",frac:0,i:0};
  let curM = -1;
  if(st.m < 0){
    renderOverture(ctx, smooth(st.sub), t);
    curM = -1;
  } else if(st.m >= M.length){
    renderCoda(ctx, smooth(st.sub), t);
    curM = M.length;
  } else {
    curM = st.m;
    beat = getBeat(st.sub);
    const fn = RENDER[M[curM].v] || RENDER["1.0"];
    fn(ctx, st.sub, beat, t, M[curM]);
  }

  ctx.restore();

  // UI overlays
  updateHUD(curM, st.sub, beat);
  updateMinimap(y, curM, st.sub);
  updatePlaque(curM, st.sub, beat);
  updateScrollbar();

  // Audio scheduling — movement change + motif
  if(audioReady && curM>=0 && curM<M.length){
    if(curM !== curMovement){
      curMovement = curM;
      motifState.beat = 0; motifNextTime = AC.currentTime + 0.2;
    }
    const intensity = beat.name==="approach"? 0.25 : beat.name==="anticipation"? 0.55 : beat.name==="arrival"? 1.0 : beat.name==="sustained"? 0.85 : 0.45;
    scheduleMotif(AC.currentTime, curM, intensity);
  }

  rafId = requestAnimationFrame(frame);
}

/* ---------- Boot sequence ---------- */
function bootProgress(p){ document.getElementById("bootf").style.width = (p*100)+"%"; }
function boot(){
  let p = 0;
  bootProgress(0.05);
  // stage 1: portraits
  setTimeout(()=>{ buildPortraits(); bootProgress(0.4);
    // stage 2: admin mocks
    setTimeout(()=>{ buildAdminMocks(); bootProgress(0.7);
      // stage 3: minimap
      setTimeout(()=>{ buildMinimap(); bootProgress(0.95);
        setTimeout(()=>{ bootProgress(1.0);
          setTimeout(()=>{ document.getElementById("boot").classList.add("gone"); }, 500);
        }, 160);
      }, 120);
    }, 120);
  }, 180);
}
boot();
rafId = requestAnimationFrame(frame);

/* ---------- Start / audio unlock on first gesture ---------- */
function startOnce(){
  if(started) return; started = true;
  try { initAudio(); fadeIn(); } catch(e){ console.warn("audio init failed", e); }
  const sp = document.getElementById("splash");
  if(sp) sp.classList.add("gone");
}

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WP Museum v7 — Corridor of Versions</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#000;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
  body{height: 700vh; /* 7 rooms × 100vh */}
  #stage{position:fixed;inset:0;overflow:hidden;background:#000;z-index:1}
  canvas#view{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;display:block}
  /* Click-to-start overlay */
  #splash{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(60% 50% at 50% 50%,#120609,#000);color:#f5e8c8;font-family:"Courier New",monospace;cursor:pointer;transition:opacity .6s}
  #splash .box{text-align:center;padding:40px;border:2px solid #8a1818;box-shadow:0 0 0 6px #300,0 0 60px #600 inset;background:#1a0808}
  #splash h1{font-size:42px;letter-spacing:4px;color:#ffbe66;text-shadow:2px 2px 0 #600;margin-bottom:14px}
  #splash p{font-size:13px;line-height:1.7;max-width:420px;color:#dcc9a0}
  #splash .k{color:#ffd27f;font-weight:bold}
  #splash.gone{opacity:0;pointer-events:none}

  /* DOM plaque */
  #plaque{position:fixed;left:50%;bottom:14%;transform:translateX(-50%) translateY(30px);z-index:20;
    width:min(720px,92vw);pointer-events:none;opacity:0;transition:opacity .4s ease,transform .5s ease}
  #plaque.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  #plaque .card{display:grid;grid-template-columns:160px 1fr;gap:18px;padding:18px 22px;
    background:linear-gradient(180deg,rgba(18,14,10,.94),rgba(6,4,3,.94));
    border:1px solid var(--accent,#e9c97a);box-shadow:0 0 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.05) inset;
    border-radius:6px;color:#f3ead6}
  #plaque .port{width:160px;height:200px;background:#0a0806;border-radius:4px;overflow:hidden;box-shadow:inset 0 0 20px rgba(0,0,0,.8)}
  #plaque .port svg{width:100%;height:100%;display:block}
  #plaque h2{font:700 22px/1.1 Georgia,serif;color:var(--accent,#e9c97a);margin-bottom:2px;letter-spacing:.5px}
  #plaque .sub{font:500 12px/1.4 "Courier New",monospace;opacity:.7;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
  #plaque .body{font:400 13.5px/1.55 Georgia,serif;color:#e5dcc6;margin-bottom:12px}
  #plaque button{pointer-events:auto;font:600 11px/1 "Courier New",monospace;letter-spacing:2px;padding:9px 14px;
    border:1px solid var(--accent,#e9c97a);background:transparent;color:var(--accent,#e9c97a);cursor:pointer;
    text-transform:uppercase;transition:all .15s}
  #plaque button:hover{background:var(--accent,#e9c97a);color:#0a0706}

  /* HUD */
  #hud{position:fixed;left:0;right:0;bottom:0;height:90px;z-index:15;pointer-events:none;
    background:linear-gradient(180deg,transparent,rgba(0,0,0,.75));display:flex;align-items:flex-end}
  #hud .bar{width:100%;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;font-family:"Courier New",monospace;color:#d9c488}
  #hud .era{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.85}
  #hud .room{font-size:22px;font-weight:700;color:var(--accent,#e9c97a);text-shadow:0 0 12px var(--accent,#e9c97a)}
  #hud .year{font-size:11px;letter-spacing:2px;opacity:.7}
  #hud .face{width:48px;height:48px;border:2px solid #8a1818;background:#2a0a0a;display:flex;align-items:center;justify-content:center;
    font-size:24px;color:#ffb05a;font-weight:900;box-shadow:inset 0 0 10px #500}
  #hud .stat{display:flex;gap:10px;align-items:center}

  /* Minimap */
  #minimap{position:fixed;top:14px;right:14px;z-index:15;width:210px;height:64px;
    background:rgba(0,0,0,.7);border:1px solid #c69b4a;padding:6px;font-family:"Courier New",monospace;color:#e9c97a;font-size:10px}
  #minimap .title{font-size:9px;letter-spacing:2px;opacity:.7;margin-bottom:4px}
  #minimap .dots{display:flex;gap:4px;align-items:center;height:18px}
  #minimap .d{flex:1;height:10px;background:#2a1a0a;border:1px solid #4a3820;transition:all .3s;position:relative}
  #minimap .d.past{background:#4a3010;border-color:#8a5a20}
  #minimap .d.now{background:#e9c97a;border-color:#fff;box-shadow:0 0 10px #ffc94a}
  #minimap .label{font-size:9px;margin-top:3px;opacity:.6;letter-spacing:1px}

  /* Crosshair */
  #xhair{position:fixed;left:50%;top:48%;width:14px;height:14px;margin-left:-7px;margin-top:-7px;z-index:10;pointer-events:none;opacity:.4}
  #xhair::before,#xhair::after{content:"";position:absolute;background:#f5e8c8}
  #xhair::before{left:6px;top:0;width:2px;height:14px}
  #xhair::after{left:0;top:6px;width:14px;height:2px}

  /* Scroll hint */
  #hint{position:fixed;left:50%;top:55%;transform:translateX(-50%);z-index:12;color:#f5e8c8;
    font-family:"Courier New",monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;
    opacity:0;transition:opacity .6s;text-shadow:0 2px 8px #000;pointer-events:none}
  #hint.show{opacity:.7}
  #hint::after{content:"▼";display:block;text-align:center;margin-top:8px;animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

  /* Playground iframe overlay */
  #playground{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);display:none;flex-direction:column}
  #playground.open{display:flex}
  #playground .pg-head{height:40px;background:#0a0806;border-bottom:1px solid #c69b4a;display:flex;align-items:center;padding:0 14px;color:#e9c97a;font-family:"Courier New",monospace;font-size:12px;letter-spacing:2px}
  #playground .pg-head button{margin-left:auto;background:transparent;border:1px solid #e9c97a;color:#e9c97a;padding:6px 14px;font:inherit;cursor:pointer;letter-spacing:2px}
  #playground .pg-head button:hover{background:#e9c97a;color:#0a0706}
  #playground iframe{flex:1;border:0;background:#fff;width:100%}

  #flash{position:fixed;inset:0;background:#fff;pointer-events:none;opacity:0;z-index:8;mix-blend-mode:screen;transition:opacity .8s}
</style>
</head>
<body>
<div id="stage">
  <canvas id="view"></canvas>
</div>
<div id="flash"></div>
<div id="xhair"></div>
<div id="hint">Scroll to walk</div>
<div id="minimap">
  <div class="title">CORRIDOR MAP</div>
  <div class="dots" id="dots"></div>
  <div class="label" id="mini-label">—</div>
</div>
<div id="hud">
  <div class="bar">
    <div class="stat">
      <div class="face" id="face">W</div>
      <div>
        <div class="era" id="era">WORDPRESS</div>
        <div class="room" id="hud-room">—</div>
      </div>
    </div>
    <div class="year" id="year">—</div>
  </div>
</div>
<div id="plaque">
  <div class="card">
    <div class="port" id="portrait"></div>
    <div>
      <div class="sub" id="p-sub">VERSION · DATE</div>
      <h2 id="p-name">—</h2>
      <div class="body" id="p-body">—</div>
      <button id="p-btn">▶ ACTIVATE IN PLAYGROUND</button>
    </div>
  </div>
</div>
<div id="splash">
  <div class="box">
    <h1>CORRIDOR OF VERSIONS</h1>
    <p>Seven doors. Twenty-two years of WordPress. A first-person walk through the major releases, one decade of rendering tech at a time.</p>
    <p style="margin-top:14px"><span class="k">SCROLL</span> to move forward. <span class="k">CLICK</span> to begin.</p>
  </div>
</div>
<div id="playground">
  <div class="pg-head"><span id="pg-label">—</span><button id="pg-close">✕ CLOSE</button></div>
  <iframe id="pg-frame" title="Playground" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
"use strict";

/* =========================================================================
   WordPress Museum — v7-corridor
   A procedurally-textured raycast FPS walk through seven WordPress majors.
   Scroll is the movement axis. Canvas-2D raycaster, procedural textures,
   procedural SVG jazz portraits, procedural WebAudio ambient music.
   ========================================================================= */

/* ---------- Data: the seven major rooms ---------- */
const ROOMS = [
  {
    v:"1.0", name:"Miles", date:"2004-01-03", musician:"Miles Davis",
    hist:"Released January 3, 2004 as WordPress's first numbered major and the start of the jazz-codename tradition, honoring Miles Davis. 'Miles' introduced search-engine-friendly permalinks, a post preview pane, and a real plugin API — the spine that every future WordPress extension would grow on.",
    theme:"bunker",
    accent:"#ff6a3d",
    key:"Dm7", bpm:70, chord:[[57,60,64,67],[55,58,62,65],[53,57,60,63]], bass:[38,36,35,34],
    palette:{wall:[110,60,34],wall2:[70,30,18],floor:[40,22,14],ceil:[18,10,8],fog:[26,8,4],light:[255,120,50],ambient:0.18},
    tex:"brick"
  },
  {
    v:"2.0", name:"Duke", date:"2005-12-31", musician:"Duke Ellington",
    hist:"A New Year's Eve gift in 2005 named for Duke Ellington. Duke shipped a rich TinyMCE WYSIWYG editor, image uploads, Akismet anti-spam, and the user-role system that still structures WordPress today — the release where writing in WordPress started to feel like writing, not like tagging.",
    theme:"crypt",
    accent:"#ffc36b",
    key:"Ab7", bpm:84, chord:[[56,60,63,66],[54,57,61,64],[52,56,59,63]], bass:[32,31,30,33],
    palette:{wall:[90,82,70],wall2:[50,44,36],floor:[30,26,20],ceil:[22,20,16],fog:[30,22,14],light:[255,180,90],ambient:0.24},
    tex:"stone"
  },
  {
    v:"3.0", name:"Thelonious", date:"2010-06-17", musician:"Thelonious Monk",
    hist:"June 2010, named for Thelonious Monk. 'Thelonious' merged WordPress MU into core — multisite for everyone — and introduced custom post types and custom menus. The default theme Twenty Ten retired the long-serving Kubrick. A civilizational shift for the platform.",
    theme:"lab",
    accent:"#9be3d4",
    key:"Cmaj7", bpm:96, chord:[[60,64,67,71],[62,65,69,72],[59,62,65,69]], bass:[36,38,41,43],
    palette:{wall:[190,198,204],wall2:[120,128,138],floor:[70,80,90],ceil:[210,220,230],fog:[180,200,210],light:[230,250,255],ambient:0.55},
    tex:"tech"
  },
  {
    v:"4.0", name:"Benny", date:"2014-09-04", musician:"Benny Goodman",
    hist:"September 2014, honoring Benny Goodman. A symbolic number bump rather than a rewrite — 'Benny' delivered a smoother grid-style media library, embed previews inside the editor, and a new plugin installer. The release that made WordPress feel, for the first time, truly modern.",
    theme:"atrium",
    accent:"#f0d28c",
    key:"Fmaj9", bpm:78, chord:[[53,57,60,64],[55,59,62,65],[52,55,59,62]], bass:[29,31,33,34],
    palette:{wall:[220,210,180],wall2:[150,135,100],floor:[110,92,62],ceil:[240,230,205],fog:[210,195,160],light:[255,230,170],ambient:0.5},
    tex:"marble"
  },
  {
    v:"5.0", name:"Bebo", date:"2018-12-06", musician:"Bebo Valdés",
    hist:"December 2018, named for Cuban pianist Bebo Valdés. 'Bebo' shipped Gutenberg — the block editor — the biggest change to WordPress editing since 2.0. Twenty Nineteen arrived as the first block-ready default theme. The release where every post became a composition of blocks.",
    theme:"gallery",
    accent:"#c6f0d1",
    key:"Bbmaj7", bpm:88, chord:[[58,62,65,69],[60,63,67,70],[56,60,63,67]], bass:[34,36,39,41],
    palette:{wall:[240,244,248],wall2:[190,200,210],floor:[225,230,236],ceil:[250,252,254],fog:[220,230,240],light:[255,255,255],ambient:0.7},
    tex:"glass"
  },
  {
    v:"6.0", name:"Arturo", date:"2022-05-24", musician:"Arturo O'Farrill",
    hist:"May 2022, named for Arturo O'Farrill. 'Arturo' advanced Full Site Editing with style variations, a Write mode that strips distractions, and locking controls for block patterns. The release where designers could finally shape a whole WordPress site in one visual interface.",
    theme:"neon",
    accent:"#ff5ad9",
    key:"Emaj7", bpm:104, chord:[[64,68,71,75],[62,66,69,73],[67,71,74,78]], bass:[40,38,43,41],
    palette:{wall:[28,4,40],wall2:[60,10,80],floor:[10,4,24],ceil:[14,4,40],fog:[12,4,28],light:[255,90,220],ambient:0.22},
    tex:"neon"
  },
  {
    v:"7.0", name:"Monk", date:"2026-02-10", musician:"Thelonious Monk (reprise)",
    hist:"A landmark 2026 release completing the cycle back to Monk. 'Monk' lands the collaborative editing foundation after years of Phase-3 groundwork, and Twenty Twenty-Six ships an AI-assisted block-styling helper. A quiet, white, open-ended room where the platform starts writing with you instead of for you.",
    theme:"void",
    accent:"#a9b8ff",
    key:"Cmaj9", bpm:60, chord:[[60,64,67,71,74],[62,65,69,72,76],[57,60,64,67,71]], bass:[36,38,33,34],
    palette:{wall:[245,248,252],wall2:[210,220,235],floor:[238,242,248],ceil:[252,254,255],fog:[240,244,252],light:[250,250,255],ambient:0.85},
    tex:"void"
  }
];

/* ---------- Canvas & world setup ---------- */
const canvas = document.getElementById('view');
const ctx = canvas.getContext('2d', { alpha:false, willReadFrequently:true });
let W = 800, H = 450;               // internal render resolution
let screenW=1, screenH=1;
function resize(){
  screenW = window.innerWidth;
  screenH = window.innerHeight;
  // Scale render resolution to keep perf good on big screens
  const scale = (screenW > 1400) ? 0.55 : (screenW > 900 ? 0.65 : 0.75);
  W = Math.max(480, Math.floor(screenW * scale));
  H = Math.max(270, Math.floor(screenH * scale));
  canvas.width = W; canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

/* ---------- Map ----------
   Each room is a straight hallway 7 tiles wide, roomLen long.
   Total map: width 9 (walls at x=0, x=8), length = rooms*roomLen + 2.
   Player advances in +y. Plaques on side walls at midroom.
*/
const MAP_W = 9;
const ROOM_LEN = 18;
const CAP = 2;
const MAP_H = ROOMS.length * ROOM_LEN + CAP * 2;

// Per-tile data: 0 = empty, otherwise a texture id (room index * 10 + wallKind)
const map = new Uint8Array(MAP_W * MAP_H);
function mget(x,y){ if(x<0||y<0||x>=MAP_W||y>=MAP_H) return 255; return map[y*MAP_W+x]; }
function mset(x,y,v){ if(x<0||y<0||x>=MAP_W||y>=MAP_H) return; map[y*MAP_W+x]=v; }
// Build walls along x=0 and x=MAP_W-1 for every y, tagged with room index+1
for(let y=0;y<MAP_H;y++){
  const r = Math.max(0, Math.min(ROOMS.length-1, Math.floor((y-CAP)/ROOM_LEN)));
  mset(0,y, r+1);
  mset(MAP_W-1,y, r+1);
}
// End caps (front + back wall)
for(let x=0;x<MAP_W;x++){ mset(x,0, 1); mset(x, MAP_H-1, ROOMS.length); }

// Doorway pillars between rooms (little archway bumps on inside walls)
for(let r=1;r<ROOMS.length;r++){
  const y = CAP + r*ROOM_LEN - 1;
  mset(1, y, r); mset(MAP_W-2, y, r);     // previous-room corners
  mset(1, y+1, r+1); mset(MAP_W-2, y+1, r+1); // next-room corners
}

// Plaque tiles: mark mid-room side wall with special id = 200 + roomIndex
for(let r=0;r<ROOMS.length;r++){
  const y = CAP + r*ROOM_LEN + Math.floor(ROOM_LEN/2);
  mset(0, y, 200 + r);   // left wall plaque
}

/* Given a world y, return the room index it belongs to. */
function roomAtY(y){
  return Math.max(0, Math.min(ROOMS.length-1, Math.floor((y - CAP) / ROOM_LEN)));
}

/* ---------- Procedural textures (64×64 each) ---------- */
const TEX = 64;
function makeTex(drawer){
  const c = document.createElement('canvas'); c.width=TEX; c.height=TEX;
  const g = c.getContext('2d'); drawer(g);
  // Flatten to Uint8ClampedArray for fast column sampling
  const img = g.getImageData(0,0,TEX,TEX);
  return { canvas:c, data:img.data };
}
function mixColors(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
function rgb(c){ return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; }

function drawBrick(g, c1, c2, mortar){
  g.fillStyle = rgb(mortar); g.fillRect(0,0,TEX,TEX);
  const bh = 8, bw = 16;
  for(let row=0;row<TEX/bh;row++){
    const offset = (row%2)*8;
    for(let col=-1;col<TEX/bw+1;col++){
      const x = col*bw + offset, y = row*bh;
      const t = Math.random();
      const base = mixColors(c1,c2,t*0.7);
      g.fillStyle = rgb(base);
      g.fillRect(x+1,y+1,bw-2,bh-2);
      // highlight
      g.fillStyle = `rgba(255,255,255,${0.06+Math.random()*0.05})`;
      g.fillRect(x+1,y+1,bw-2,1);
      // shadow
      g.fillStyle = `rgba(0,0,0,${0.18+Math.random()*0.1})`;
      g.fillRect(x+1,y+bh-2,bw-2,1);
    }
  }
  // noise
  for(let i=0;i<400;i++){
    g.fillStyle=`rgba(0,0,0,${Math.random()*0.15})`;
    g.fillRect(Math.random()*TEX|0,Math.random()*TEX|0,1,1);
  }
}

function drawStone(g,c1,c2){
  g.fillStyle = rgb(c2); g.fillRect(0,0,TEX,TEX);
  // random polygonal stones
  for(let i=0;i<14;i++){
    const x=Math.random()*TEX,y=Math.random()*TEX;
    const r=6+Math.random()*10;
    const col = mixColors(c1,c2,Math.random()*0.6);
    g.fillStyle = rgb(col);
    g.beginPath();
    const pts=6+Math.floor(Math.random()*3);
    for(let p=0;p<pts;p++){
      const ang=p/pts*Math.PI*2;
      const rr=r*(0.7+Math.random()*0.4);
      g.lineTo(x+Math.cos(ang)*rr,y+Math.sin(ang)*rr);
    }
    g.closePath();g.fill();
    g.strokeStyle=`rgba(0,0,0,0.4)`;g.stroke();
  }
  // cracks
  g.strokeStyle='rgba(0,0,0,0.3)';
  for(let i=0;i<6;i++){
    g.beginPath();
    let x=Math.random()*TEX,y=Math.random()*TEX;
    g.moveTo(x,y);
    for(let j=0;j<4;j++){ x+=(Math.random()-0.5)*14;y+=(Math.random()-0.5)*14;g.lineTo(x,y);}
    g.stroke();
  }
}

function drawTech(g,c1,c2,accent){
  g.fillStyle = rgb(c1); g.fillRect(0,0,TEX,TEX);
  // panel seams
  g.strokeStyle = rgb(c2); g.lineWidth=1;
  g.strokeRect(2,2,TEX-4,TEX-4);
  g.strokeRect(6,6,TEX-12,TEX-12);
  // rivets
  g.fillStyle = rgb(c2);
  [[8,8],[TEX-8,8],[8,TEX-8],[TEX-8,TEX-8]].forEach(([x,y])=>{g.beginPath();g.arc(x,y,1.5,0,Math.PI*2);g.fill();});
  // Caution stripe
  for(let i=0;i<TEX;i+=8){
    g.fillStyle='rgba(255,200,40,0.5)';
    g.fillRect(i, TEX-4, 4, 2);
  }
  // Label
  g.fillStyle=`rgba(${accent[0]},${accent[1]},${accent[2]},0.6)`;
  g.fillRect(TEX/2-8,TEX/2-2,16,4);
}

function drawMarble(g,c1,c2,gold){
  // veined marble
  g.fillStyle = rgb(c1); g.fillRect(0,0,TEX,TEX);
  for(let i=0;i<4;i++){
    g.strokeStyle = `rgba(${gold[0]},${gold[1]},${gold[2]},${0.3+Math.random()*0.3})`;
    g.lineWidth = 0.5+Math.random();
    g.beginPath();
    let x=0,y=Math.random()*TEX;
    g.moveTo(x,y);
    while(x<TEX){
      x+=4;y+=(Math.random()-0.5)*8;
      g.lineTo(x,y);
    }
    g.stroke();
  }
  // soft shading
  const grad=g.createLinearGradient(0,0,TEX,TEX);
  grad.addColorStop(0,'rgba(255,255,255,0.12)');
  grad.addColorStop(1,'rgba(0,0,0,0.18)');
  g.fillStyle=grad;g.fillRect(0,0,TEX,TEX);
  // gold trim top/bottom
  g.fillStyle=rgb(gold);
  g.fillRect(0,0,TEX,2);g.fillRect(0,TEX-2,TEX,2);
}

function drawGlass(g,c1,c2){
  g.fillStyle = rgb(c1); g.fillRect(0,0,TEX,TEX);
  // frosted vertical lines
  for(let x=0;x<TEX;x+=2){
    g.fillStyle=`rgba(255,255,255,${0.05+Math.random()*0.08})`;
    g.fillRect(x,0,1,TEX);
  }
  // grid blocks
  g.strokeStyle=rgb(c2);g.lineWidth=1;
  for(let x=0;x<=TEX;x+=16){ g.beginPath();g.moveTo(x,0);g.lineTo(x,TEX);g.stroke(); }
  for(let y=0;y<=TEX;y+=16){ g.beginPath();g.moveTo(0,y);g.lineTo(TEX,y);g.stroke(); }
  // sparkle
  for(let i=0;i<20;i++){
    g.fillStyle=`rgba(255,255,255,${Math.random()*0.4})`;
    g.fillRect(Math.random()*TEX|0,Math.random()*TEX|0,1,1);
  }
}

function drawNeon(g,c1,c2,accent){
  g.fillStyle = rgb(c1); g.fillRect(0,0,TEX,TEX);
  // Vaporwave grid
  g.strokeStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},0.9)`;
  g.lineWidth = 1;
  for(let x=0;x<=TEX;x+=8){
    g.beginPath();g.moveTo(x,0);g.lineTo(x,TEX);g.stroke();
  }
  for(let y=0;y<=TEX;y+=8){
    g.beginPath();g.moveTo(0,y);g.lineTo(TEX,y);g.stroke();
  }
  // Glow bar
  const grad=g.createLinearGradient(0,TEX/2,0,TEX);
  grad.addColorStop(0,`rgba(${accent[0]},${accent[1]},${accent[2]},0.4)`);
  grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grad;g.fillRect(0,TEX/2,TEX,TEX/2);
  // Sun
  g.fillStyle=`rgba(${c2[0]},${c2[1]},${c2[2]},0.8)`;
  g.beginPath();g.arc(TEX/2, TEX*0.38, 10, 0, Math.PI*2);g.fill();
}

function drawVoid(g,c1,c2){
  const grad=g.createLinearGradient(0,0,0,TEX);
  grad.addColorStop(0,rgb(c2));
  grad.addColorStop(1,rgb(c1));
  g.fillStyle=grad;g.fillRect(0,0,TEX,TEX);
  // very faint horizontal lines
  for(let y=8;y<TEX;y+=16){
    g.fillStyle='rgba(180,190,220,0.1)';
    g.fillRect(0,y,TEX,1);
  }
}

function drawPlaqueTex(g, accent, label){
  g.fillStyle = '#0a0806'; g.fillRect(0,0,TEX,TEX);
  // outer frame
  g.strokeStyle = rgb(accent); g.lineWidth = 2;
  g.strokeRect(2,2,TEX-4,TEX-4);
  g.strokeStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},0.4)`;
  g.strokeRect(6,6,TEX-12,TEX-12);
  // label area
  g.fillStyle = rgb(accent);
  g.font = 'bold 14px "Courier New",monospace';
  g.textAlign='center';
  g.fillText(label, TEX/2, TEX/2 - 2);
  g.font = '8px "Courier New",monospace';
  g.fillStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},0.6)`;
  g.fillText('WP', TEX/2, TEX/2 + 12);
  // corner lights
  g.fillStyle = rgb(accent);
  g.fillRect(4,4,3,3);g.fillRect(TEX-7,4,3,3);g.fillRect(4,TEX-7,3,3);g.fillRect(TEX-7,TEX-7,3,3);
}

// Build one texture per room plus plaque variants
const textures = []; // indexed by id (1..ROOMS.length) and 200+i for plaques
for(let r=0;r<ROOMS.length;r++){
  const room = ROOMS[r];
  const p = room.palette;
  const accent = hexToRgb(room.accent);
  let tx;
  if(room.tex==='brick') tx = makeTex(g=>drawBrick(g, p.wall, p.wall2, [30,15,10]));
  else if(room.tex==='stone') tx = makeTex(g=>drawStone(g, p.wall, p.wall2));
  else if(room.tex==='tech') tx = makeTex(g=>drawTech(g, p.wall, p.wall2, accent));
  else if(room.tex==='marble') tx = makeTex(g=>drawMarble(g, p.wall, p.wall2, accent));
  else if(room.tex==='glass') tx = makeTex(g=>drawGlass(g, p.wall, p.wall2));
  else if(room.tex==='neon') tx = makeTex(g=>drawNeon(g, p.wall, p.wall2, accent));
  else tx = makeTex(g=>drawVoid(g, p.wall, p.wall2));
  textures[r+1] = tx;
  textures[200+r] = makeTex(g=>drawPlaqueTex(g, accent, room.v));
}

function hexToRgb(h){ const n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; }

/* ---------- Player state ---------- */
const player = {
  x: MAP_W/2, y: CAP + 0.8,
  targetY: CAP + 0.8,
  yaw: Math.PI/2,       // facing +y
  targetYaw: Math.PI/2,
  bob: 0,
};

// FOV
const FOV = Math.PI/2.6; // ~70°

/* ---------- Raycaster ---------- */
function renderFrame(){
  const buf = ctx.getImageData(0,0,W,H);
  const d = buf.data;

  // Which room are we in (for ceiling/floor fog colors)
  const rp = roomAtY(player.y);
  const pal = ROOMS[rp].palette;
  const fog = pal.fog;

  // Clear with sky/ceiling gradient
  for(let y=0;y<H;y++){
    // ceiling darker, floor lighter
    const t = y < H/2 ? (y/(H/2)) : ((H-y)/(H/2));
    const isCeil = y < H/2;
    const base = isCeil ? pal.ceil : pal.floor;
    const mix = 0.3 + 0.7*t; // darker near horizon
    const r = base[0]*mix + fog[0]*(1-mix);
    const g = base[1]*mix + fog[1]*(1-mix);
    const b = base[2]*mix + fog[2]*(1-mix);
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;
    }
  }

  // Camera basis
  const dirX = Math.cos(player.yaw), dirY = Math.sin(player.yaw);
  const planeScale = Math.tan(FOV/2);
  const planeX =  dirY * planeScale * (W/H) * 0.65;
  const planeY = -dirX * planeScale * (W/H) * 0.65;

  const sprites = []; // plaque hits with camera x

  for(let col=0; col<W; col++){
    const camX = 2*col/W - 1;
    const rdx = dirX + planeX*camX;
    const rdy = dirY + planeY*camX;

    let mapX = Math.floor(player.x);
    let mapY = Math.floor(player.y);

    const deltaX = Math.abs(1/rdx);
    const deltaY = Math.abs(1/rdy);
    let stepX, stepY, sideDistX, sideDistY;
    if(rdx < 0){ stepX=-1; sideDistX = (player.x-mapX)*deltaX; }
    else{ stepX=1; sideDistX=(mapX+1-player.x)*deltaX; }
    if(rdy < 0){ stepY=-1; sideDistY=(player.y-mapY)*deltaY; }
    else{ stepY=1; sideDistY=(mapY+1-player.y)*deltaY; }

    let hit = 0, side = 0, tileId = 0;
    for(let iter=0; iter<MAP_H*2; iter++){
      if(sideDistX < sideDistY){ sideDistX+=deltaX; mapX+=stepX; side=0; }
      else{ sideDistY+=deltaY; mapY+=stepY; side=1; }
      const t = mget(mapX, mapY);
      if(t!==0 && t!==255){ hit=1; tileId=t; break; }
    }
    if(!hit) continue;

    const perpDist = side===0 ? (sideDistX - deltaX) : (sideDistY - deltaY);
    if(perpDist <= 0.001) continue;

    const lineH = Math.floor(H / perpDist);
    let drawStart = -lineH/2 + H/2;
    let drawEnd = lineH/2 + H/2;
    const ds = Math.max(0, drawStart|0), de = Math.min(H-1, drawEnd|0);

    // wallX: position along the wall
    let wallX;
    if(side===0) wallX = player.y + perpDist*rdy;
    else wallX = player.x + perpDist*rdx;
    wallX -= Math.floor(wallX);
    let texX = Math.floor(wallX * TEX);
    if(side===0 && rdx>0) texX = TEX - texX - 1;
    if(side===1 && rdy<0) texX = TEX - texX - 1;

    const tex = textures[tileId];
    if(!tex) continue;
    const texData = tex.data;

    // Shading: side + distance fog + light flicker near torches for rooms 0/1
    const rForThis = roomAtY(mapY);
    const palH = ROOMS[rForThis].palette;
    const fogH = palH.fog;
    let bright = 1.0;
    if(side===1) bright *= 0.78;
    // flicker for bunker/crypt
    if(rForThis<=1){
      bright *= (0.85 + 0.15*Math.sin(time*8 + col*0.17) + 0.05*Math.sin(time*23.5));
    }
    // neon pulse for 6
    if(rForThis===5){ bright *= (0.9 + 0.15*Math.sin(time*3 + mapY*0.5)); }
    // plaque glow
    if(tileId >= 200){ bright *= 1.2; }

    const fogDist = Math.min(1, perpDist/18);
    const ambient = palH.ambient;

    for(let y=ds; y<=de; y++){
      const texY = Math.min(TEX-1, Math.max(0, Math.floor(((y - (-lineH/2 + H/2))*TEX)/lineH)));
      const ti = (texY*TEX + texX)*4;
      let r = texData[ti], g = texData[ti+1], b = texData[ti+2];
      r = r*bright; g = g*bright; b = b*bright;
      // Fog blend
      r = r*(1-fogDist) + fogH[0]*fogDist*(1-ambient*0.3);
      g = g*(1-fogDist) + fogH[1]*fogDist*(1-ambient*0.3);
      b = b*(1-fogDist) + fogH[2]*fogDist*(1-ambient*0.3);
      const di = (y*W + col)*4;
      d[di]=r; d[di+1]=g; d[di+2]=b;
    }

    // Collect plaque hit for DOM popup trigger
    if(tileId >= 200){
      const pr = tileId - 200;
      if(!sprites[pr] || sprites[pr].dist > perpDist) sprites[pr] = { dist: perpDist, col };
    }

    // Also shade floor/ceiling for this column with distance fog (simple post pass)
    // (done in initial fill + we do a per-column tint here)
    for(let y=0; y<ds; y++){
      const di = (y*W+col)*4;
      // mix in fog as distance from horizon grows
      const depth = Math.min(1, (H/2 - y) / (H/2) * 0.6 + 0.2);
      d[di]   = d[di]   *(1-depth*0.3) + fogH[0]*depth*0.3;
      d[di+1] = d[di+1] *(1-depth*0.3) + fogH[1]*depth*0.3;
      d[di+2] = d[di+2] *(1-depth*0.3) + fogH[2]*depth*0.3;
    }
  }

  ctx.putImageData(buf, 0, 0);

  // Overlays (torches, neon, etc.) drawn on top
  drawAmbientFx(rp);

  // Record nearest plaque distance for UI
  nearestPlaque = null;
  for(let r=0;r<ROOMS.length;r++){
    if(sprites[r] && sprites[r].dist < 4.5){
      if(!nearestPlaque || sprites[r].dist < nearestPlaque.dist){
        nearestPlaque = { room:r, dist: sprites[r].dist };
      }
    }
  }
}

let nearestPlaque = null;

function drawAmbientFx(rp){
  const room = ROOMS[rp];
  // Room-specific overlay
  if(room.theme==='bunker'){
    // red emergency light pulse
    const p = 0.3 + 0.15*Math.sin(time*2);
    ctx.fillStyle = `rgba(80,10,10,${p*0.25})`;
    ctx.fillRect(0,0,W,H);
    // vignette
    radialVignette('rgba(20,0,0,0.7)');
  } else if(room.theme==='crypt'){
    radialVignette('rgba(0,0,0,0.55)');
    // torch flicker overlay — warm gradient low
    const a = 0.2 + 0.1*Math.sin(time*11);
    const grad = ctx.createLinearGradient(0,H*0.6,0,H);
    grad.addColorStop(0,'rgba(255,160,60,0)');
    grad.addColorStop(1,`rgba(255,120,30,${a})`);
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  } else if(room.theme==='lab'){
    // fluorescent cold top bar
    const grad = ctx.createLinearGradient(0,0,0,H*0.3);
    grad.addColorStop(0,'rgba(220,240,255,0.12)');
    grad.addColorStop(1,'rgba(220,240,255,0)');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    radialVignette('rgba(0,20,30,0.2)');
  } else if(room.theme==='atrium'){
    // skylight soft gold
    const grad = ctx.createLinearGradient(0,0,0,H*0.5);
    grad.addColorStop(0,'rgba(255,230,170,0.22)');
    grad.addColorStop(1,'rgba(255,230,170,0)');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  } else if(room.theme==='gallery'){
    // very soft white, almost nothing
    ctx.fillStyle='rgba(255,255,255,0.05)';
    ctx.fillRect(0,0,W,H);
  } else if(room.theme==='neon'){
    // scanlines
    for(let y=0;y<H;y+=2){
      ctx.fillStyle='rgba(255,90,220,0.04)';
      ctx.fillRect(0,y,W,1);
    }
    radialVignette('rgba(30,0,40,0.5)');
    // horizon glow
    const g2 = ctx.createLinearGradient(0,H*0.45,0,H*0.55);
    g2.addColorStop(0,'rgba(255,90,220,0)');
    g2.addColorStop(0.5,'rgba(255,90,220,0.35)');
    g2.addColorStop(1,'rgba(90,230,255,0)');
    ctx.fillStyle=g2;ctx.fillRect(0,H*0.45,W,H*0.1);
  } else if(room.theme==='void'){
    // soft blue tint, overexposed
    ctx.fillStyle='rgba(240,245,255,0.08)';
    ctx.fillRect(0,0,W,H);
    // bloom-ish top
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'rgba(255,255,255,0.25)');
    grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  }
  // head bob vertical offset overlay — canvas handled via sub-shift
}

function radialVignette(color){
  const g = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3, W/2,H/2,Math.max(W,H)*0.7);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,color);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

/* ---------- Scroll physics ---------- */
let time = 0;
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - lastT)/1000);
  lastT = now;
  time += dt;

  // Map scroll position to targetY
  const scrollMax = document.body.scrollHeight - window.innerHeight;
  const s = scrollMax > 0 ? window.scrollY / scrollMax : 0;
  const inner = MAP_H - 2*CAP - 1.6;
  player.targetY = CAP + 0.8 + s * inner;

  // Critically-damped-ish interpolation
  const lerp = 1 - Math.exp(-dt * 5.0);
  player.y += (player.targetY - player.y) * lerp;

  // Auto-look: subtle yaw nudge toward left-wall plaque as we pass it
  let targetYaw = Math.PI/2;
  const r = roomAtY(player.y);
  const midY = CAP + r*ROOM_LEN + ROOM_LEN/2;
  const plaqueDelta = player.y - midY;   // -ve: approaching, +ve: past
  if(plaqueDelta > -3 && plaqueDelta < 3){
    const prox = 1 - Math.abs(plaqueDelta)/3;   // 0..1
    // plaque is on the LEFT wall (x=0); after plane flip, left wall = left screen,
    // so we turn yaw slightly to face -x: from π/2 toward π.
    targetYaw = Math.PI/2 + 0.35 * prox;
  }
  player.targetYaw = targetYaw;
  player.yaw += (player.targetYaw - player.yaw) * (1 - Math.exp(-dt*3.5));

  // Bob
  const speed = Math.abs(player.targetY - player.y);
  player.bob = Math.sin(time*6) * Math.min(0.12, speed*4);
  player.y += player.bob * 0.002;

  renderFrame();
  updateUI(r);
  updateAudio(r);

  requestAnimationFrame(frame);
}

let currentRoom = -1;
let lastFlashed = -1;
function updateUI(r){
  if(r !== currentRoom){
    currentRoom = r;
    const room = ROOMS[r];
    elRoom.textContent = `WordPress ${room.v} "${room.name}"`;
    elYear.textContent = room.date;
    elEra.textContent = ['BUNKER / 2004','CRYPT / 2005','LABORATORY / 2010','ATRIUM / 2014','GALLERY / 2018','GRID / 2022','VOID / 2026'][r];
    elFace.textContent = room.v.split('.')[0];
    elFace.style.borderColor = room.accent;
    elFace.style.color = room.accent;
    elFace.style.background = 'rgba(0,0,0,0.5)';
    document.documentElement.style.setProperty('--accent', room.accent);
    document.querySelectorAll('#dots .d').forEach((el,i)=>{
      el.classList.toggle('past', i<r);
      el.classList.toggle('now', i===r);
    });
    elMiniLabel.textContent = `${r+1}/7  ${room.v} — ${room.name}`;
    // plaque content (not shown until near)
    pName.textContent = `${room.name} — WordPress ${room.v}`;
    pSub.textContent = `${room.date} · CODENAME ${room.musician.toUpperCase()}`;
    pBody.textContent = room.hist;
    pBtn.style.borderColor = room.accent;
    pBtn.style.color = room.accent;
    pBtn.onclick = ()=>openPlayground(room.v);
    portEl.innerHTML = buildPortrait(r);
    plaqueEl.style.setProperty('--accent', room.accent);
    // HUD style morphing
    const styleT = r/(ROOMS.length-1); // 0..1
    elFace.style.boxShadow = styleT < 0.5
      ? `inset 0 0 10px rgba(255,50,50,${0.6-styleT})`
      : `0 0 14px ${room.accent}`;
    // flash transition
    if(lastFlashed !== r){
      lastFlashed = r;
      const fl = document.getElementById('flash');
      fl.style.background = room.accent;
      fl.style.opacity = '0.3';
      setTimeout(()=>{ fl.style.opacity = '0'; }, 60);
    }
  }
  // Show plaque DOM based on proximity to mid-room
  const midY = CAP + r*ROOM_LEN + ROOM_LEN/2;
  const nearPlaque = Math.abs(player.y - midY) < 3.0;
  if(nearPlaque){
    plaqueEl.classList.add('show');
    hint.classList.remove('show');
  } else {
    plaqueEl.classList.remove('show');
    if(window.scrollY < 40) hint.classList.add('show'); else hint.classList.remove('show');
  }
}

/* ---------- Procedural jazz ambient (WebAudio) ---------- */
let audioCtx = null, masterGain = null, roomGains = [], roomLoops = [];
function initAudio(){
  if(audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.22;
    masterGain.connect(audioCtx.destination);
    for(let r=0;r<ROOMS.length;r++){
      const g = audioCtx.createGain(); g.gain.value = 0; g.connect(masterGain);
      roomGains.push(g);
      roomLoops.push(buildRoomLoop(ROOMS[r], g));
    }
  } catch(e){ console.warn('audio failed', e); }
}

function midiHz(m){ return 440 * Math.pow(2, (m-69)/12); }

function buildRoomLoop(room, outGain){
  // Simple jazz-chord pad: one oscillator per chord note, triangle+sine pair.
  // Bass: slow triangle walking line. Drums: noise burst per beat.
  const pads = [];
  for(let i=0;i<6;i++){
    const o = audioCtx.createOscillator(); o.type = (i%2===0)?'triangle':'sine';
    const g = audioCtx.createGain(); g.gain.value = 0;
    const filt = audioCtx.createBiquadFilter();
    filt.type='lowpass'; filt.frequency.value = 1800 + Math.random()*600;
    o.connect(filt); filt.connect(g); g.connect(outGain);
    o.start();
    pads.push({o,g,filt});
  }
  // bass
  const bassOsc = audioCtx.createOscillator(); bassOsc.type='triangle';
  const bassG = audioCtx.createGain(); bassG.gain.value = 0;
  const bassFilt = audioCtx.createBiquadFilter(); bassFilt.type='lowpass'; bassFilt.frequency.value = 400;
  bassOsc.connect(bassFilt); bassFilt.connect(bassG); bassG.connect(outGain);
  bassOsc.start();

  // noise buffer for brush hits
  const bufSize = audioCtx.sampleRate * 0.3;
  const noiseBuf = audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for(let i=0;i<bufSize;i++) nd[i] = (Math.random()*2-1) * Math.exp(-i/(bufSize*0.18));
  function brush(){
    const src = audioCtx.createBufferSource(); src.buffer = noiseBuf;
    const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 4000; bp.Q.value=0.8;
    const g = audioCtx.createGain(); g.gain.value = 0.08;
    src.connect(bp); bp.connect(g); g.connect(outGain);
    src.start();
  }

  const secPerBeat = 60/room.bpm;
  let beat = 0;
  let chordIdx = 0;
  function tick(){
    const ch = room.chord[chordIdx % room.chord.length];
    // attack new chord every 4 beats
    if(beat % 4 === 0){
      pads.forEach((p,i)=>{
        const note = ch[i % ch.length];
        const detune = (i<ch.length ? 0 : 1200); // upper voice octave
        p.o.frequency.setTargetAtTime(midiHz(note) * (i>=ch.length?2:1), audioCtx.currentTime, 0.3);
        p.g.gain.cancelScheduledValues(audioCtx.currentTime);
        p.g.gain.setTargetAtTime(0.07/(i+1)+0.02, audioCtx.currentTime, 0.8);
      });
      chordIdx++;
    }
    // bass every beat, walking
    const bn = room.bass[beat % room.bass.length];
    bassOsc.frequency.setTargetAtTime(midiHz(bn), audioCtx.currentTime, 0.05);
    bassG.gain.cancelScheduledValues(audioCtx.currentTime);
    bassG.gain.setTargetAtTime(0.14, audioCtx.currentTime, 0.02);
    bassG.gain.setTargetAtTime(0.02, audioCtx.currentTime + secPerBeat*0.7, 0.1);
    // brush on every 2nd beat
    if(beat % 2 === 1) brush();
    beat++;
  }
  const interval = setInterval(tick, secPerBeat*1000);
  tick();
  return { pads, bassOsc, interval };
}

function updateAudio(r){
  if(!audioCtx) return;
  // crossfade room gains based on distance in room-index space
  const frac = (player.y - CAP) / ROOM_LEN; // floating room index
  for(let i=0;i<ROOMS.length;i++){
    const dist = Math.abs(i - frac);
    const w = Math.max(0, 1 - dist*0.9);
    roomGains[i].gain.setTargetAtTime(w*0.9, audioCtx.currentTime, 0.35);
  }
}

/* ---------- Playground overlay ---------- */
const pgEl = document.getElementById('playground');
const pgFrame = document.getElementById('pg-frame');
const pgLabel = document.getElementById('pg-label');
document.getElementById('pg-close').addEventListener('click', ()=>{
  pgEl.classList.remove('open');
  pgFrame.src = 'about:blank';
});
function openPlayground(v){
  pgLabel.textContent = `PLAYGROUND · WordPress ${v}`;
  pgFrame.src = `https://playground.wordpress.net/?wp=${v}`;
  pgEl.classList.add('open');
}

/* ---------- Splash / first-gesture handler ---------- */
const splash = document.getElementById('splash');
function start(){
  splash.classList.add('gone');
  initAudio();
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  setTimeout(()=>hint.classList.add('show'), 400);
  setTimeout(()=>hint.classList.remove('show'), 6000);
}
splash.addEventListener('click', start, {once:true});
window.addEventListener('keydown', (e)=>{
  if(splash.classList.contains('gone')) return;
  if(e.key === ' ' || e.key === 'Enter') start();
});
// Start on first scroll too
window.addEventListener('scroll', ()=>{
  if(!splash.classList.contains('gone')) start();
}, {once:true});

/* ---------- Initial render kick ---------- */
updateUI(0);
requestAnimationFrame(frame);

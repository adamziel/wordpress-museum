<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506" role="img" aria-labelledby="title desc">
  <title id="title">Original reconstruction of the WordPress 1.5 Strayhorn themes admin</title>
  <desc id="desc">A rights-cleared, stylized reconstruction of a WordPress 1.5-era administration screen emphasizing themes, pages, and dashboard publishing.</desc>
  <rect width="900" height="506" fill="#edf0e9"/>
  <rect x="28" y="24" width="844" height="34" fill="#2c4439"/>
  <text x="48" y="46" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">WordPress</text>
  <text x="720" y="45" fill="#dce9df" font-family="Arial, sans-serif" font-size="12">View site | Logout</text>
  <rect x="28" y="61" width="844" height="30" fill="#d9e1d5"/>
  <g font-family="Arial, sans-serif" font-size="13" fill="#243a31">
    <text x="47" y="81">Dashboard</text>
    <text x="138" y="81">Write</text>
    <text x="198" y="81">Manage</text>
    <text x="278" y="81" font-weight="700">Presentation</text>
    <text x="396" y="81">Plugins</text>
    <text x="462" y="81">Users</text>
    <text x="522" y="81">Options</text>
  </g>
  <rect x="82" y="112" width="736" height="336" fill="#fbfcf7" stroke="#b9c3b3"/>
  <text x="108" y="148" fill="#2d4e3a" font-family="Georgia, serif" font-size="25">Themes and Pages</text>
  <line x1="108" y1="160" x2="780" y2="160" stroke="#91ad86" stroke-width="2"/>
  <rect x="108" y="190" width="205" height="180" fill="#ffffff" stroke="#b5c2af"/>
  <rect x="130" y="216" width="160" height="92" fill="#d6e1d0" stroke="#9bb195"/>
  <rect x="148" y="236" width="124" height="18" fill="#f9faf6"/>
  <rect x="148" y="266" width="84" height="11" fill="#f9faf6"/>
  <rect x="148" y="286" width="112" height="11" fill="#f9faf6"/>
  <text x="132" y="338" fill="#2e4738" font-family="Arial, sans-serif" font-size="15" font-weight="700">Default Theme</text>
  <text x="132" y="358" fill="#597064" font-family="Arial, sans-serif" font-size="12">Kubrick-inspired layout</text>
  <rect x="347" y="190" width="205" height="180" fill="#ffffff" stroke="#b5c2af"/>
  <text x="371" y="224" fill="#2e4738" font-family="Arial, sans-serif" font-size="15" font-weight="700">Pages</text>
  <line x1="371" y1="238" x2="520" y2="238" stroke="#c3cdbd"/>
  <text x="371" y="268" fill="#597064" font-family="Arial, sans-serif" font-size="12">About</text>
  <text x="389" y="293" fill="#597064" font-family="Arial, sans-serif" font-size="12">Team</text>
  <text x="389" y="318" fill="#597064" font-family="Arial, sans-serif" font-size="12">Contact</text>
  <rect x="586" y="190" width="194" height="180" fill="#ffffff" stroke="#b5c2af"/>
  <text x="610" y="224" fill="#2e4738" font-family="Arial, sans-serif" font-size="15" font-weight="700">Dashboard</text>
  <text x="610" y="252" fill="#597064" font-family="Arial, sans-serif" font-size="12">At-a-glance publishing status</text>
  <rect x="610" y="276" width="132" height="16" fill="#dce7d6"/>
  <rect x="610" y="304" width="96" height="16" fill="#dce7d6"/>
  <rect x="610" y="332" width="118" height="16" fill="#dce7d6"/>
  <rect x="108" y="394" width="672" height="28" fill="#e4ebdf" stroke="#b5c2af"/>
  <text x="128" y="413" fill="#31483a" font-family="Arial, sans-serif" font-size="13">Themes, static pages, and the dashboard push WordPress beyond a pure weblog tool.</text>
  <text x="82" y="478" fill="#607064" font-family="Arial, sans-serif" font-size="12">Original WordPress Museum reconstruction for publication use.</text>
</svg>

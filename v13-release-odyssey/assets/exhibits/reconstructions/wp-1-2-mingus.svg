<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506" role="img" aria-labelledby="title desc">
  <title id="title">Original reconstruction of the WordPress 1.2 Mingus plugins era admin</title>
  <desc id="desc">A rights-cleared, stylized reconstruction of a WordPress 1.2-era administration screen emphasizing plugins and extensibility.</desc>
  <rect width="900" height="506" fill="#efe9d7"/>
  <rect x="28" y="24" width="844" height="34" fill="#2f5360"/>
  <text x="48" y="46" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">WordPress</text>
  <text x="718" y="45" fill="#dce9e9" font-family="Arial, sans-serif" font-size="12">Howdy, admin | Logout</text>
  <rect x="28" y="61" width="844" height="30" fill="#d6d2bd"/>
  <g font-family="Arial, sans-serif" font-size="13" fill="#253940">
    <text x="47" y="81">Write</text>
    <text x="104" y="81">Manage</text>
    <text x="184" y="81">Links</text>
    <text x="244" y="81">Presentation</text>
    <text x="358" y="81" font-weight="700">Plugins</text>
    <text x="426" y="81">Users</text>
    <text x="486" y="81">Options</text>
  </g>
  <rect x="82" y="112" width="736" height="336" fill="#fbfaf1" stroke="#bfb9a2"/>
  <text x="108" y="148" fill="#394c53" font-family="Georgia, serif" font-size="25">Plugin Architecture</text>
  <line x1="108" y1="160" x2="780" y2="160" stroke="#b8ad86" stroke-width="2"/>
  <text x="108" y="192" fill="#4d4531" font-family="Arial, sans-serif" font-size="14">Plugins can now hook into actions and filters across WordPress.</text>
  <rect x="108" y="220" width="672" height="42" fill="#e7dfc5" stroke="#b9ae8e"/>
  <text x="130" y="246" fill="#283b42" font-family="Arial, sans-serif" font-size="15" font-weight="700">hello.php</text>
  <text x="300" y="246" fill="#5e5847" font-family="Arial, sans-serif" font-size="13">Active</text>
  <rect x="672" y="229" width="84" height="24" fill="#f9f7ec" stroke="#9f967d"/>
  <text x="692" y="246" fill="#4b442f" font-family="Arial, sans-serif" font-size="12">Deactivate</text>
  <rect x="108" y="274" width="672" height="42" fill="#f6f1df" stroke="#cfc5a4"/>
  <text x="130" y="300" fill="#283b42" font-family="Arial, sans-serif" font-size="15" font-weight="700">textile-helper.php</text>
  <text x="300" y="300" fill="#5e5847" font-family="Arial, sans-serif" font-size="13">Inactive</text>
  <rect x="672" y="283" width="84" height="24" fill="#f9f7ec" stroke="#9f967d"/>
  <text x="697" y="300" fill="#4b442f" font-family="Arial, sans-serif" font-size="12">Activate</text>
  <rect x="108" y="338" width="315" height="78" fill="#ffffff" stroke="#c8c0a3"/>
  <text x="126" y="365" fill="#3b4b4d" font-family="Arial, sans-serif" font-size="14" font-weight="700">Hooks everywhere</text>
  <text x="126" y="390" fill="#5d5a4a" font-family="Arial, sans-serif" font-size="12">Actions, filters, custom fields, post previews.</text>
  <rect x="465" y="338" width="315" height="78" fill="#ffffff" stroke="#c8c0a3"/>
  <text x="483" y="365" fill="#3b4b4d" font-family="Arial, sans-serif" font-size="14" font-weight="700">Structured publishing</text>
  <text x="483" y="390" fill="#5d5a4a" font-family="Arial, sans-serif" font-size="12">Subcategories and moderation tools mature.</text>
  <text x="82" y="478" fill="#6c664d" font-family="Arial, sans-serif" font-size="12">Original WordPress Museum reconstruction for publication use.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="506" viewBox="0 0 900 506" role="img" aria-labelledby="title desc">
  <title id="title">Original reconstruction of the WordPress 4.0 Benny media admin</title>
  <desc id="desc">A rights-cleared, stylized reconstruction of a WordPress 4.0-era screen emphasizing the media grid, embeds, and polished classic-editor workflow.</desc>
  <rect width="900" height="506" fill="#f5f6f7"/>
  <rect x="0" y="0" width="900" height="32" fill="#23282d"/>
  <rect x="0" y="32" width="172" height="474" fill="#30363c"/>
  <text x="18" y="22" fill="#fff" font-family="Arial, sans-serif" font-size="15" font-weight="700">WordPress</text>
  <g font-family="Arial, sans-serif" font-size="13" fill="#c8d1d8">
    <text x="22" y="76">Dashboard</text>
    <text x="22" y="116">Posts</text>
    <text x="22" y="156" fill="#fff" font-weight="700">Media</text>
    <text x="42" y="184" fill="#7ad6ff">Library</text>
    <text x="22" y="228">Pages</text>
    <text x="22" y="268">Comments</text>
    <text x="22" y="308">Appearance</text>
    <text x="22" y="348">Plugins</text>
  </g>
  <text x="214" y="82" fill="#1d2327" font-family="Georgia, serif" font-size="29">Media Library</text>
  <rect x="214" y="108" width="596" height="40" fill="#fff" stroke="#ccd0d4"/>
  <text x="236" y="133" fill="#52616c" font-family="Arial, sans-serif" font-size="13">Grid view, details preview, and smoother publishing flow</text>
  <g>
    <rect x="214" y="178" width="128" height="96" fill="#d8e7ee" stroke="#c3ccd2"/>
    <rect x="360" y="178" width="128" height="96" fill="#e8dfec" stroke="#c3ccd2"/>
    <rect x="506" y="178" width="128" height="96" fill="#dfead9" stroke="#c3ccd2"/>
    <rect x="652" y="178" width="128" height="96" fill="#efe4d0" stroke="#c3ccd2"/>
    <rect x="214" y="296" width="128" height="96" fill="#e5eef6" stroke="#c3ccd2"/>
    <rect x="360" y="296" width="128" height="96" fill="#f2e3e0" stroke="#c3ccd2"/>
    <rect x="506" y="296" width="128" height="96" fill="#e8edf0" stroke="#c3ccd2"/>
    <rect x="652" y="296" width="128" height="96" fill="#dee8e1" stroke="#c3ccd2"/>
  </g>
  <rect x="624" y="124" width="186" height="244" fill="#fff" stroke="#c4ccd2"/>
  <text x="646" y="158" fill="#1d2327" font-family="Arial, sans-serif" font-size="16" font-weight="700">Attachment Details</text>
  <rect x="646" y="184" width="142" height="92" fill="#dae8ef"/>
  <g fill="#9aa8b2">
    <rect x="646" y="304" width="118" height="10"/>
    <rect x="646" y="328" width="92" height="10"/>
  </g>
  <rect x="214" y="424" width="596" height="28" fill="#e7eef4"/>
  <text x="234" y="443" fill="#445d6c" font-family="Arial, sans-serif" font-size="13">Benny adds polish to media management, embeds, plugin discovery, and focused writing.</text>
  <text x="214" y="478" fill="#687780" font-family="Arial, sans-serif" font-size="12">Original WordPress Museum reconstruction for publication use.</text>
</svg>
